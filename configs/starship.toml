# Focused prompt: path, git context, and a clean prompt symbol.
# Colors are matched to the focused Ghostty profile while staying readable in
# plain light terminals.

format = """
$directory$git_branch$git_status
$character"""

right_format = ""
add_newline = true

[directory]
style = "bold #0077cc"
home_symbol = "~"
truncation_length = 3
truncation_symbol = ".../"
read_only = " ro"

[git_branch]
format = " on [$symbol$branch]($style)"
symbol = "git:"
style = "bold #7a3fd1"

[git_status]
format = "([$all_status$ahead_behind]($style))"
style = "bold #d12f2b"
conflicted = "="
ahead = ">"
behind = "<"
diverged = "<>"
up_to_date = ""
untracked = "?"
stashed = "\\$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "x"

[character]
success_symbol = "[❯](bold #178c45)"
error_symbol = "[❯](bold #d12f2b)"
vimcmd_symbol = "[❮](bold #178c45)"
