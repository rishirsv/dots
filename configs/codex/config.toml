[features]
apps = true
undo = true
js_repl = false

[tools]
view_image = true

[features.multi_agent_v2]
hide_spawn_agent_metadata = false
tool_namespace = "agents"

[agents]
max_threads = 6
max_depth = 1

[apps._default]
