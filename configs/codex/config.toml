# Portable user-level Codex preferences.
# Do not add machine-local cache paths, trust hashes, marketplace timestamps, or
# per-project scratch directories here.

approval_policy = "never"
sandbox_mode = "danger-full-access"
service_tier = "priority"
model = "gpt-5.5"
model_reasoning_effort = "medium"

notify = ["/Users/rishi/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

[tools]
view_image = true

[features]
apps = true
memories = true
prevent_idle_sleep = true
undo = true
js_repl = false

[apps._default]
open_world_enabled = true
destructive_enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."agent@agent"]
enabled = true

[plugins."meta-skill@agent"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."build-ios-apps@steady-app"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = false

[plugins."pdf@openai-primary-runtime"]
enabled = false

[plugins."spreadsheets@openai-primary-runtime"]
enabled = false

[plugins."presentations@openai-primary-runtime"]
enabled = false

[projects."/Users/rishi/Code/dots"]
trust_level = "trusted"

[projects."/Users/rishi/Code/agent"]
trust_level = "trusted"

[projects."/Users/rishi/Code/steady-app"]
trust_level = "trusted"

[marketplaces.agent]
source_type = "local"
source = "/Users/rishi/Code/dots/dist/codex"

[desktop.appearanceLightChromeTheme]
accent = "#339cff"
contrast = 45
ink = "#1a1c1f"
opaqueWindows = false
surface = "#ffffff"

[desktop.appearanceLightChromeTheme.fonts]
code = "CommitMono"

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#00a240"
diffRemoved = "#ba2623"
skill = "#924ff7"

[desktop.appearanceDarkChromeTheme]
accent = "#339cff"
contrast = 60
ink = "#ffffff"
opaqueWindows = false
surface = "#181818"

[desktop.appearanceDarkChromeTheme.fonts]
code = "CommitMono"

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#40c977"
diffRemoved = "#fa423e"
skill = "#ad7bf9"
