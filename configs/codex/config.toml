git-create-pull-request-as-draft = false
git-commit-instructions = """
Run `git status --short` and `git diff --staged`. Stage only intended paths or hunks; preserve unrelated changes. Split independently reviewable work, or ask one scope question if partial staging is risky.

Run `git diff --staged --check`. Reuse fresh validation; otherwise run obvious, cheap focused tests or linters. Never invent evidence or use `--no-verify` unless asked. Match `git log --oneline -5`; use an imperative subject of at most 50 characters. Add a body only to preserve the reason, constraint, or tradeoff, and omit tool-attribution trailers.

After committing, run `git show --stat --oneline HEAD` and report the SHA, subject, and validation. Push only when explicitly requested: `git push` with an upstream, or `git push -u origin \"$(git branch --show-current)\"` without one. Ask first for detached/default branches, unclear remotes, or possible non-fast-forwards. Never open a PR, merge, rebase shared history, or force-push unless explicitly asked.
"""
git-pr-instructions = """
Require a local Git repository, clear scope, `gh --version`, and authenticated `gh auth status`;

Run `git status -sb`, `git diff --stat`, and `git diff --staged --stat`. If scope is mixed or unclear, ask which paths belong before staging, committing, or pushing. From the default branch, create the smallest repo-native, human-readable branch; otherwise keep the current branch unless asked. Repair review comments on the existing PR branch.

Stage only intended paths, commit the confirmed description, run the most relevant checks, then `git push -u origin \"$(git branch --show-current)\"`. Create a draft PR by default and mark it ready only when explicitly requested. Match nearby PR title style. Write a concise reviewer-facing body covering outcome and impact, context or root cause, core implementation, review focus, and validation; use a temporary file for CLI Markdown when useful.

Re-query the PR for merge state, checks, review decision, and review threads. UI or visual changes require real screenshot or clip embeds in the live body; keep the PR draft while required evidence is missing. Never stage unrelated changes or push without confirmed scope, and stop if no accessible GitHub remote exists. Summarize the branch, commit, PR URL, validation, PR health, and remaining confirmations.
"""
reviewDelivery = "detached"
open-link-in-target-preference = "in-app-browser"
show-context-window-usage = true
show-ultra-in-model-picker-slider = true
