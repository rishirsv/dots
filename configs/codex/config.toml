###############################################################################
# Core Configuration
###############################################################################

approval_policy = "never"
plan_mode_reasoning_effort = "high"
personality = "friendly"
sandbox_mode = "danger-full-access"
suppress_unstable_features_warning = true
model_reasoning_effort = "high"

###############################################################################
# Workspace & Filesystem
###############################################################################

[sandbox_workspace_write]
exclude_slash_tmp = false
exclude_tmpdir_env_var = false
network_access = true
writable_roots = []

###############################################################################
# Features
###############################################################################

[features]
apps = true
multi_agent = true
prevent_idle_sleep = true
rmcp_client = true
shell_snapshot = true
steer = true
undo = true
unified_exec = true
voice_transcription = true

###############################################################################
# Agents
###############################################################################

[agents]
max_threads = 8

[agents.explorer]
config_file = "agents/explorer.toml"
description = "Read-only codebase explorer for thorough code path mapping, evidence gathering, and analysis."

[agents.researcher]
config_file = "agents/researcher.toml"
description = "Research-focused subagent. For every task, invoke $research first, then summarize sources and recommendations."

[agents.reviewer]
config_file = "agents/reviewer.toml"
description = "Review-focused subagent. For every task, invoke $review first, then deliver findings."

[agents.worker]
config_file = "agents/worker.toml"
description = "Implementation-focused agent for careful code changes, local refactors, and verification."

[agents.docs_gardener]
config_file = "agents/docs-gardener.toml"
description = "Documentation-maintenance subagent that keeps docs aligned with current code behavior and repository conventions."

[agents.design_evaluator]
config_file = "agents/design-evaluator.toml"
description = "Read-only design evaluator for scoring UI quality, surfacing blockers, and recommending whether to refine, pivot, or stop."

###############################################################################
# Shell Environment
###############################################################################

[shell_environment_policy]
exclude = []
experimental_use_profile = true
ignore_default_excludes = true
include_only = []
inherit = "all"
set = {}

###############################################################################
# UI & Notice Settings
###############################################################################

check_for_update_on_startup = true
file_opener = "vscode"

[notice]
hide_full_access_warning = true
hide_rate_limit_model_nudge = true
hide_world_writable_warning = true

[tui]
animations = true
notifications = true
show_tooltips = true

###############################################################################
# Skills
###############################################################################
