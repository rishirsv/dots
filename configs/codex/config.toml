# Codex user config managed from the dots repo.
# Symlinked into ~/.codex/config.toml and ~/.codex-personal/config.toml.

approval_policy = "never"
sandbox_mode = "danger-full-access"
model = "gpt-5.6-sol"
model_reasoning_effort = "high"

notify = ["/Users/rishi/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

[projects."/Users/rishi/Code/dots"]
