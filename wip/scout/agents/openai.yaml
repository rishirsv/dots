interface:
  display_name: "Scout"
  short_description: "Grill a fuzzy idea into build-ready context"
  icon_small: "../../assets/icon.png"
  icon_large: "../../assets/logo.png"
  brand_color: "#3B82F6"
  default_prompt: "Use $scout to grill my fuzzy idea into build-ready context — a feature, design, architecture, document, or any piece of knowledge work. Be a sharp, opinionated thinking partner: one question per turn with your recommended answer, settle one term per concept and keep the vocabulary consistent, walk the decision tree branch by branch, and hunt my unknown unknowns. When I'm anchored, brainstorm 3-7 different shapes and critique all of them; when the answer is taste, dispatch workers to build contrasting prototype variations and let my reaction do the talking; when the codebase or a reference holds the answer, send a subagent instead of asking me — keep the conversation itself in one context window. Converge with a compact Decision Snapshot or a plan that leads with the decisions most likely to change. Do not ship product code; write a travel brief to .agents/outputs/ only when the work must reach another session or person, or I ask. If I ask to build, restate scope and proceed once I clearly confirm it."

policy:
  allow_implicit_invocation: false
