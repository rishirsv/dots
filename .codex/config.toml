# Repo-local Codex config for maximum local autonomy in this trusted repo.
# Supplements ~/.codex/config.toml when this trusted repository is open.

approval_policy = "never"
sandbox_mode = "danger-full-access"

[tools]
view_image = true

[features]
apps = true
memories = true
prevent_idle_sleep = true
undo = true

[apps._default]
open_world_enabled = true
destructive_enabled = true
