[target]
path = "target.md"

[loop]
max_experiments = 30
stall_limit = 5

[agent]
backend = "claude"                   # "claude", "codex", or "custom"
model = ""                           # Exact CLI model name, e.g. "gpt-5.4-mini" or "sonnet"
# custom_command = ""                # Optional when backend = "custom"; use {prompt} or stdin

[dashboard]
port = 8384
auto_open = true

# Define binary evals below. Each eval checks one specific thing.
# type = "code" for objective checks, "judge" for interpretive checks.
#
# Code-based eval options for 'check':
#   contains      — pass_condition string is found in the output
#   not_contains  — pass_condition string is NOT found in the output
#   regex         — output matches the regex in 'pattern'
#   valid_json    — output is valid JSON
#
# Judge-based evals require a judge_file pointing to a judge prompt in judges/

# [[evals]]
