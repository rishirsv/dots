<style>
:root{--page:#f7f5ef;--surface:#fff;--ink:#191918;--muted:#706f69;--faint:#aaa79d;--line:#e1ded4;--soft:#efede6;--header:#191918;--accent:#d66f50;--blue:#3568a8;--blue-bg:#edf3fb;--amber:#9a6a10;--amber-bg:#fbf5e5;--green:#537a55;--green-bg:#edf4ed;--red:#a8433b;--red-bg:#faecea;--radius:7px;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--serif:Georgia,"Times New Roman",serif;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}
*{box-sizing:border-box}html,body{margin:0;min-height:100%}body{background:var(--page);color:var(--ink);font:14px/1.55 var(--serif)}button,input,select,textarea{font:inherit;color:inherit}:focus-visible{outline:2px solid var(--accent);outline-offset:2px}.top{min-height:64px;background:var(--header);color:#faf9f5;display:flex;align-items:center;gap:24px;padding:12px 28px}.brand{font:600 18px/1 var(--sans)}.root{font:11px var(--mono);color:#a9a79f;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.status{margin-left:auto;font:12px var(--sans);color:#c9c6bc}.shell{min-height:calc(100vh - 64px);display:grid;grid-template-columns:224px minmax(0,1fr)}.rail{border-right:1px solid var(--line);background:#f0eee7;padding:18px 10px;overflow:auto}.rail h2,.eyebrow{font:600 10px/1.3 var(--sans);text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin:0 10px 10px}.skill{display:block;width:100%;border:0;background:transparent;text-align:left;padding:10px;border-radius:5px;cursor:pointer}.skill:hover{background:#e7e4db}.skill.active{background:var(--surface);box-shadow:0 0 0 1px var(--line)}.skill strong{display:block;font:600 13px var(--sans)}.skill small{display:flex;justify-content:space-between;color:var(--muted);font:11px var(--sans);margin-top:2px}.main{min-width:0}.hero{background:var(--surface);border-bottom:1px solid var(--line);padding:24px 32px 0}.hero-row{display:flex;align-items:flex-end;gap:20px}.hero-copy{min-width:0}.hero h1{font:600 26px/1.2 var(--sans);letter-spacing:-.025em;margin:0}.hero p{color:var(--muted);margin:5px 0 0;max-width:720px}.actions{margin-left:auto;display:flex;gap:8px}.tabs{display:flex;gap:24px;margin-top:20px}.tab{border:0;border-bottom:2px solid transparent;background:transparent;padding:8px 0 11px;color:var(--muted);font:500 13px var(--sans);cursor:pointer}.tab.active{border-color:var(--ink);color:var(--ink)}.content{padding:24px 32px 48px;max-width:1480px;margin:0 auto}.btn,input,select,textarea{border:1px solid var(--line);background:var(--surface);border-radius:5px;padding:8px 10px}.btn{font:500 13px var(--sans);cursor:pointer}.btn:hover{background:var(--soft)}.btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}.btn.primary:hover{background:#30302e}.btn:disabled{opacity:.4;cursor:not-allowed}.back{border:0;background:none;color:var(--blue);font:500 13px var(--sans);padding:0;cursor:pointer}.section-head{display:flex;align-items:baseline;gap:10px;margin:24px 0 10px}.section-head:first-child{margin-top:0}.section-head h2{font:600 15px var(--sans);margin:0}.section-head .spacer{margin-left:auto}.muted{color:var(--muted)}.mono{font:11px var(--mono)}.empty{border:1px dashed #c9c5b9;border-radius:var(--radius);padding:44px;text-align:center;color:var(--muted)}.summary{display:flex;gap:28px;margin-bottom:18px}.summary b{display:block;font:600 22px/1.1 var(--sans)}.summary span{color:var(--muted);font:12px var(--sans)}.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface)}table{width:100%;border-collapse:collapse}th,td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}tr:last-child td{border-bottom:0}th{font:600 10px var(--sans);letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:var(--soft)}tr[data-run],tr[data-case]{cursor:pointer}tr[data-run]:hover,tr[data-case]:hover{background:#fbfaf7}.matrix th:not(:first-child),.matrix td:not(:first-child){min-width:145px;text-align:center}.case-title{font:600 12px var(--mono)}.state{display:inline-flex;align-items:center;gap:6px;font:600 12px var(--sans)}.state::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}.passed,.pass{color:var(--green)}.failed,.fail{color:var(--red)}.inconclusive,.partial,.unknown,.ungraded{color:var(--amber)}.annotation-count{display:block;color:var(--muted);font:11px var(--sans);margin-top:3px}.setup{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:18px}.form,.boundary,.task-card,.version{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)}.form{padding:20px}.field{display:grid;gap:6px;margin-bottom:16px}.field>span{font:600 11px var(--sans)}.field small{color:var(--muted)}.field input,.field textarea,.field select{width:100%}.checks{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px 16px}.check{display:flex;gap:8px;align-items:flex-start;font-family:var(--sans)}.check input{width:auto;margin-top:4px}.boundary{background:var(--soft);padding:16px;align-self:start}.boundary h3{font:600 12px var(--sans);margin:0 0 8px}.boundary dl{margin:0}.boundary dt{font:600 9px var(--sans);text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-top:10px}.boundary dd{margin:1px 0}.review-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}.review-head h2{font:600 18px var(--sans);margin:0}.progress{margin-left:auto;font:12px var(--sans);color:var(--muted)}.task-card{margin-bottom:16px}.section-label{padding:9px 12px;border-bottom:1px solid var(--line);background:var(--soft);font:600 10px var(--sans);text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}.task-body{padding:14px 16px;white-space:pre-wrap}.comparison{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px}.version{min-width:0;overflow:hidden}.version-head{padding:11px 13px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px;font-family:var(--sans)}.version-name{font-weight:600}.version-meta{font-size:11px;color:var(--muted)}.version-baseline .version-head{background:var(--amber-bg)}.version-current .version-head{background:var(--blue-bg)}.output{padding:16px;white-space:pre-wrap;min-height:180px;max-height:520px;overflow:auto;font-size:14px;line-height:1.65}.artifact{border-top:1px solid var(--line)}.artifact-head{display:flex;justify-content:space-between;gap:10px;padding:8px 12px;background:var(--soft);font:11px var(--mono)}.artifact-head a{color:var(--accent);font-family:var(--sans);text-decoration:none}.artifact img{display:block;max-width:100%;height:auto;margin:0 auto}.artifact iframe{display:block;width:100%;height:520px;border:0}.artifact-text{padding:12px;white-space:pre-wrap;overflow:auto;font:12px/1.5 var(--mono)}details.grades{border-top:1px solid var(--line)}details.grades summary{cursor:pointer;padding:11px 13px;font:600 12px var(--sans);list-style:none}details.grades summary::-webkit-details-marker{display:none}.grade-list{border-top:1px solid var(--line);padding:2px 13px}.criterion{padding:10px 0;border-bottom:1px solid var(--line);font-size:12px}.criterion:last-child{border:0}.criterion strong{font-family:var(--sans)}.criterion-evidence{color:var(--muted);margin-top:3px}.feedback{border-top:1px solid var(--line);padding:13px}.feedback label{display:block;font:600 11px var(--sans);margin-bottom:6px}.feedback textarea{width:100%;min-height:88px;resize:vertical}.feedback-row{display:flex;align-items:center;gap:9px;margin-top:7px}.save-state{font:11px var(--sans);color:var(--muted)}.note{background:var(--soft);padding:8px 10px;border-radius:4px;margin-bottom:7px;font-size:13px}.review-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}.config{margin-top:16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);padding:12px}.config summary{cursor:pointer;font:600 12px var(--sans)}
@media(max-width:900px){.shell{grid-template-columns:180px minmax(0,1fr)}.hero,.content{padding-left:20px;padding-right:20px}.comparison{grid-template-columns:1fr}.setup{grid-template-columns:1fr}.artifact iframe{height:420px}}
@media(max-width:680px){.top{padding:12px 16px}.shell{display:block}.rail{display:flex;gap:5px;overflow:auto;border:0;border-bottom:1px solid var(--line);padding:8px}.rail h2{display:none}.skill{min-width:150px}.hero{padding:16px 14px 0}.hero-row{display:block}.actions{margin:12px 0 0}.content{padding:16px 14px 36px}.checks{grid-template-columns:1fr}.comparison{grid-template-columns:1fr}.summary{gap:18px}.review-head{flex-wrap:wrap}.progress{width:100%;margin:0}.root{display:none}.tabs{margin-top:14px}.matrix th:not(:first-child),.matrix td:not(:first-child){min-width:120px}}
@media(max-width:380px){.top{min-height:56px}.hero h1{font-size:21px}.actions{display:grid;grid-template-columns:1fr}.summary{display:grid;grid-template-columns:1fr 1fr}.review-nav .btn{padding:7px}.artifact iframe{height:320px}}
.skill small{gap:8px}.skill small span:first-child{max-width:112px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.skill small span:last-child{white-space:nowrap}
.artifacts{padding:12px;display:grid;gap:10px;background:#faf9f5;border-bottom:1px solid var(--line)}.artifact{border:1px solid var(--line);border-radius:6px;background:var(--surface);overflow:hidden}.artifact-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 12px;background:var(--surface)}.artifact-identity{min-width:0;display:grid;grid-template-columns:42px minmax(0,1fr);align-items:center;gap:10px}.artifact-kind{display:grid;place-items:center;min-height:34px;border:1px solid var(--line);border-radius:4px;background:var(--soft);font:700 9px var(--sans);letter-spacing:.05em;color:var(--muted)}.artifact-name{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font:600 12px var(--mono)}.artifact-meta{display:block;margin-top:2px;color:var(--muted);font:11px var(--sans)}.artifact-open{flex:none;color:var(--accent);font:600 12px var(--sans);text-decoration:none}.artifact-open:hover{text-decoration:underline}.artifact img,.artifact iframe{border-top:1px solid var(--line)}.artifact-notes{padding:0 12px 11px}.artifact-notes .note{margin:0 0 6px}.artifact-empty{padding:16px;color:var(--muted);font:12px var(--sans);background:#faf9f5;border-bottom:1px solid var(--line)}.feedback select,.feedback textarea{width:100%}.feedback label+select{margin-bottom:10px}.note-context{display:block;margin-bottom:2px;color:var(--muted);font:600 10px var(--sans);text-transform:uppercase;letter-spacing:.04em}
.cell-link{border:0;background:none;padding:0;cursor:pointer}.cell-link:hover .state{text-decoration:underline}.unstable{display:block;color:var(--amber);font:600 11px var(--sans);margin-top:3px}.version.focused{box-shadow:0 0 0 2px var(--accent)}.diagnosis{margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}.diagnosis small{display:block;color:var(--muted);margin:-5px 0 8px}.promote{margin:0 0 16px;padding:14px 16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface)}.promote h3{font:600 13px var(--sans);margin:0 0 10px}.promote-grid{display:grid;grid-template-columns:180px minmax(0,1fr);gap:10px}.promote-actions{display:flex;align-items:center;gap:9px;margin-top:10px}.run-filter{margin-left:auto;display:flex;align-items:center;gap:8px;font:12px var(--sans)}
@media(max-width:680px){.promote-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="top"><div class="brand">MetaSkill</div><div class="root" id="root"></div><div class="status" id="status" aria-live="polite">Loading…</div></header>
<div id="app"></div>
<script>
const S={skills:[],skill:null,suite:null,runs:[],run:null,caseView:null,tab:'cases',setup:false,filter:'attention',focus:{candidate:null,repetition:null,artifact:null}};
const $=s=>document.querySelector(s),enc=encodeURIComponent;
async function api(path,opts){const r=await fetch(path,opts),j=await r.json();if(!r.ok)throw Error(j.error||'Request failed');return j}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function setStatus(v){$('#status').textContent=v}
function versionId(v){return v.candidate||''}
function state(v){return `<span class="state ${esc(v||'ungraded')}">${esc(v||'ungraded')}</span>`}
function route(){const q=new URLSearchParams(location.search);return {skill:q.get('skill'),tab:q.get('tab'),run:q.get('run'),caseId:q.get('case'),candidate:q.get('candidate'),repetition:Number(q.get('repetition'))||null,artifact:q.get('artifact'),filter:q.get('filter')}}
function syncUrl(push=false){const q=new URLSearchParams();if(S.skill)q.set('skill',S.skill.id);q.set('tab',S.tab);if(S.run)q.set('run',S.run.run_id);if(S.caseView)q.set('case',S.caseView.eval_id);if(S.focus.candidate)q.set('candidate',S.focus.candidate);if(S.focus.repetition)q.set('repetition',S.focus.repetition);if(S.focus.artifact)q.set('artifact',S.focus.artifact);if(S.tab==='runs'&&S.filter)q.set('filter',S.filter);history[push?'pushState':'replaceState']({},'',`${location.pathname}?${q}`)}
async function boot(){try{const wanted=route(),x=await api('/api/skills');S.skills=x.skills.filter(s=>s.suite_ready||s.run_count);$('#root').textContent=x.root;S.skill=S.skills.find(s=>s.id===wanted.skill)||S.skills.find(s=>s.suite_ready&&s.run_count)||S.skills.find(s=>s.suite_ready)||S.skills[0];S.tab=wanted.tab==='runs'?'runs':'cases';S.filter=['all','attention'].includes(wanted.filter)?wanted.filter:'attention';S.focus={candidate:wanted.candidate,repetition:wanted.repetition,artifact:wanted.artifact};await loadSkill();if(wanted.run){await openRun(wanted.run,false);if(wanted.caseId)await openCase(wanted.caseId,wanted.candidate,wanted.repetition,false)}else{render();syncUrl()}setStatus('Ready')}catch(e){showError(e)}}
async function loadSkill(){S.run=S.caseView=null;if(!S.skill){S.suite=null;S.runs=[];return}const jobs=[api(`/api/skills/${enc(S.skill.id)}/runs`)];if(S.skill.suite_ready)jobs.push(api(`/api/skills/${enc(S.skill.id)}/suite`));const out=await Promise.all(jobs);S.runs=out[0].runs;S.suite=out[1]||null}
function rail(){return `<aside class="rail"><h2>Skills</h2>${S.skills.map(s=>`<button class="skill ${S.skill?.id===s.id?'active':''}" data-skill="${esc(s.id)}"><strong>${esc(s.name)}</strong><small><span title="${esc(s.id)}">${esc(s.id)}</span><span>${s.eval_count}c · ${s.run_count}r${s.attention?` · ${s.attention} needs review`:''}</span></small></button>`).join('')}</aside>`}
function tabs(){return `<nav class="tabs" aria-label="Workbench sections">${['cases','runs'].map(t=>`<button class="tab ${S.tab===t?'active':''}" data-tab="${t}" aria-current="${S.tab===t?'page':'false'}">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}</nav>`}
function shell(content,actions=''){const s=S.skill;return `<div class="shell">${rail()}<main class="main"><header class="hero"><div class="hero-row"><div class="hero-copy"><h1>${esc(s?.name||'MetaSkill')}</h1><p>${esc(s?.description||s?.path||'No skills found.')}</p></div><div class="actions">${actions}</div></div>${s?tabs():''}</header><div class="content">${content}</div></main></div>`}
function bindShell(){document.querySelectorAll('[data-skill]').forEach(b=>b.onclick=async()=>{S.skill=S.skills.find(s=>s.id===b.dataset.skill);S.tab='cases';S.setup=false;S.focus={candidate:null,repetition:null,artifact:null};await loadSkill();render();syncUrl(true)});document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;S.run=S.caseView=null;S.setup=false;S.focus={candidate:null,repetition:null,artifact:null};render();syncUrl(true)})}
function render(){if(S.caseView)return renderCase();if(S.run)return renderRun();if(S.setup)return renderSetup();if(!S.skill)return void($('#app').innerHTML=shell('<div class="empty">No skills found.</div>'));return S.tab==='runs'?renderRuns():renderCases()}
function noSuite(){return `<div class="empty">No cases yet. Create them with <span class="mono">metaskill init --evals ${esc(S.skill.path)}</span>.</div>`}
function renderCases(){const s=S.suite,actions=`<button class="btn primary" id="run" ${s?'':'disabled'}>Run cases</button>`;const body=!s?noSuite():`<div class="section-head"><h2>Cases</h2><span class="muted">Real tasks with observable criteria.</span></div><div class="table-wrap"><table><thead><tr><th>Case</th><th>Criteria</th><th>Latest versions</th><th>Task</th></tr></thead><tbody>${s.cases.map(c=>`<tr><td class="case-title">${esc(c.id)}</td><td>${c.expectations}</td><td>${Object.entries(c.latest_outcomes||{}).map(([v,o])=>`${esc(v)}: ${state(o)}`).join('<br>')||'—'}</td><td>${esc(c.prompt_preview)}</td></tr>`).join('')}</tbody></table></div>`;$('#app').innerHTML=shell(body,actions);bindShell();$('#run')?.addEventListener('click',()=>{S.setup=true;render()})}
function renderRuns(){const actions=`<button class="btn primary" id="run" ${S.suite?'':'disabled'}>Run cases</button>`,body=!S.runs.length?'<div class="empty">No runs yet.</div>':`<div class="section-head"><h2>Runs</h2><span class="muted">Immutable comparisons across skill versions.</span></div><div class="table-wrap"><table><thead><tr><th>Run</th><th>Versions</th><th>Results</th><th>Reviewed</th></tr></thead><tbody>${S.runs.map(r=>`<tr data-run="${esc(r.run_id)}"><td>${r.objective?`<strong>${esc(r.objective)}</strong><br>`:''}<span class="mono">${esc(r.run_id)}</span><br><span class="muted">${esc(r.created_at||'')}</span></td><td>${esc((r.candidates||[]).join(' · '))}</td><td>${r.runtime_status_totals?.failed||r.runtime_status_totals?.timed_out?'<strong class="failed">runtime error · </strong>':''}${r.delta_totals?.regressed?`<strong class="failed">${r.delta_totals.regressed} regression · </strong>`:''}${r.totals?.passed||0} pass · ${r.totals?.failed||0} fail · ${r.totals?.inconclusive||0} inconclusive</td><td>${r.review?.reviewed||0}/${r.review?.total||0}</td></tr>`).join('')}</tbody></table></div>`;$('#app').innerHTML=shell(body,actions);bindShell();document.querySelectorAll('[data-run]').forEach(row=>row.onclick=()=>openRun(row.dataset.run));$('#run')?.addEventListener('click',()=>{S.setup=true;render()})}
function field(label,control,hint=''){return `<label class="field"><span>${label}</span>${control}${hint?`<small>${hint}</small>`:''}</label>`}
function renderSetup(){const s=S.suite,versions=s?s.candidates.map((v,i)=>`<label class="check"><input type="checkbox" name="version" value="${esc(versionId(v))}" ${i<2?'checked':''}><span>${esc(v.display||versionId(v))}<small class="muted">${esc(versionId(v))}</small></span></label>`).join(''):'',cases=s?s.cases.map(c=>`<label class="check"><input type="checkbox" name="case" value="${esc(c.id)}" checked><span>${esc(c.id)}</span></label>`).join(''):'';const boundary=s?.data_boundary||{};const form=`${field('What should this run establish?',`<input id="objective" value="${esc(s?.objective||'')}" placeholder="Compare these skill versions">`)}${field('Cases',`<div class="checks">${cases}</div>`)}${field('Skill versions',`<div class="checks">${versions}</div>`)}<div class="checks">${field('Repetitions','<input id="repetitions" type="number" min="1" value="1">')}${field('Model','<input id="model" placeholder="Runtime default">')}</div>`;const body=`<button class="back" id="cancel">← Back</button><div class="section-head"><h2>Run cases across versions</h2></div><div class="setup"><form class="form" id="setup">${form}<button class="btn primary" type="submit">Start run</button></form><aside class="boundary"><h3>Execution boundary</h3><dl><dt>Runner</dt><dd>${esc(boundary.runner||'codex_app_server')}</dd><dt>Model boundary</dt><dd>Tasks and grader evidence may be sent to the selected model.</dd><dt>Local storage</dt><dd class="mono">${esc(boundary.storage_root||'.skill')}</dd></dl></aside></div>`;$('#app').innerHTML=shell(body);bindShell();$('#cancel').onclick=()=>{S.setup=false;render()};$('#setup').onsubmit=launchRun}
async function launchRun(e){e.preventDefault();try{setStatus('Starting run…');const versions=[...document.querySelectorAll('[name=version]:checked')].map(x=>x.value),cases=[...document.querySelectorAll('[name=case]:checked')].map(x=>x.value);if(!versions.length||!cases.length)throw Error('Select at least one case and version.');const baseline=versions.includes('no-skill')?'no-skill':null,x=await api('/api/runs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({skill:S.skill.id,objective:$('#objective').value||null,case_ids:cases,candidates:versions,baseline,no_baseline:!baseline,repetitions:Number($('#repetitions').value),model:$('#model').value||null})});S.setup=false;S.tab='runs';await followRun(x.run_id)}catch(e){showError(e)}}
async function followRun(id,attempt=0){try{S.run=await api(`/api/runs/${enc(id)}?skill=${enc(S.skill.id)}`);render();syncUrl();if(!S.run.terminal){setStatus('Run in progress…');setTimeout(()=>followRun(id),1200)}else setStatus('Run complete')}catch(e){if(attempt<40){setStatus('Preparing run…');setTimeout(()=>followRun(id,attempt+1),500);return}showError(e)}}
async function openRun(id,push=true){try{S.run=await api(`/api/runs/${enc(id)}?skill=${enc(S.skill.id)}`);S.tab='runs';S.caseView=null;render();syncUrl(push)}catch(e){showError(e)}}
function casePriority(r,c){const trials=(c.versions||[]).flatMap(v=>v.trials||[]),comparison=(r.comparisons||[]).find(x=>x.eval_id===c.eval_id);if(trials.some(t=>['failed','timed_out'].includes((r.trials||[]).find(x=>x.trial_id===t.trial_id)?.status)))return 0;if(comparison?.delta==='regressed')return 1;if(trials.some(t=>['failed','inconclusive','ungraded'].includes(t.verdict)))return 2;return 3}
function repetitionSummary(cell){const trials=cell?.trials||[];if(trials.length<2)return '';const passed=trials.filter(t=>t.verdict==='passed').length,unstable=new Set(trials.map(t=>t.verdict)).size>1;return `<span class="${unstable?'unstable':'annotation-count'}">${passed}/${trials.length} passed${unstable?' · unstable':''}</span>`}
function caseMatrix(r){const versions=r.candidates||[],cases=[...(r.cases||[])].sort((a,b)=>casePriority(r,a)-casePriority(r,b)||a.eval_id.localeCompare(b.eval_id)).filter(c=>S.filter==='all'||casePriority(r,c)<3);return `<div class="section-head"><span class="muted">Failures and regressions appear first.</span><label class="run-filter">Show <select id="case-filter"><option value="attention" ${S.filter==='attention'?'selected':''}>Needs attention</option><option value="all" ${S.filter==='all'?'selected':''}>All cases</option></select></label></div><div class="table-wrap"><table class="matrix"><thead><tr><th>Case</th>${versions.map(v=>`<th>${esc(v.display||v.candidate)}</th>`).join('')}</tr></thead><tbody>${cases.map(c=>`<tr><td><input type="checkbox" name="rerun" value="${esc(c.eval_id)}" aria-label="Select ${esc(c.eval_id)} for rerun"> <button class="cell-link case-title" data-case="${esc(c.eval_id)}">${esc(c.eval_id)}</button></td>${versions.map(v=>{const cell=c.versions.find(x=>x.candidate===v.candidate),notes=(cell?.trials||[]).reduce((n,t)=>n+(t.annotations||[]).length,0);return `<td>${cell?`<button class="cell-link" data-case="${esc(c.eval_id)}" data-candidate="${esc(v.candidate)}">${state(cell.verdict)}</button>`:'—'}${repetitionSummary(cell)}${notes?`<span class="annotation-count">${notes} feedback note${notes===1?'':'s'}</span>`:''}</td>`}).join('')}</tr>`).join('')||`<tr><td colspan="${versions.length+1}" class="muted">No cases need attention.</td></tr>`}</tbody></table></div>`}
function renderRun(){const r=S.run,body=`<button class="back" id="back">← Runs</button><div class="section-head"><h2>${esc(r.objective||'Version comparison')}</h2><span class="mono muted">${esc(r.run_id)}</span><span class="spacer"></span><button class="btn" id="refresh">Refresh</button><button class="btn primary" id="rerun">Rerun selected</button></div><div class="summary"><div><b>${r.cases?.length||0}</b><span>cases</span></div><div><b>${r.candidates?.length||0}</b><span>versions</span></div><div><b>${r.totals?.trials||0}</b><span>outputs</span></div></div>${r.planning_error?`<div class="empty">${esc(r.planning_error)}</div>`:caseMatrix(r)}<details class="config"><summary>Exact run provenance</summary><p><b>Model:</b> ${esc(r.model||'runtime default')} · <b>Baseline:</b> ${esc(r.baseline_candidate||'none')} · <b>Suite digest:</b> <span class="mono">${esc(r.suite_digest||'—')}</span></p>${(r.coverage_limits||[]).map(x=>`<p class="inconclusive">${esc(x)}</p>`).join('')}</details>`;$('#app').innerHTML=shell(body);bindShell();$('#back').onclick=()=>{S.run=null;S.tab='runs';render();syncUrl(true)};$('#refresh').onclick=()=>openRun(r.run_id,false);document.querySelectorAll('[data-case]').forEach(row=>row.onclick=()=>openCase(row.dataset.case,row.dataset.candidate));$('#case-filter')?.addEventListener('change',e=>{S.filter=e.target.value;render();syncUrl()});$('#rerun').onclick=rerunSelected}
async function rerunSelected(){try{const cases=[...document.querySelectorAll('[name=rerun]:checked')].map(x=>x.value);if(!cases.length)throw Error('Select at least one case.');setStatus('Starting rerun…');const x=await api(`/api/runs/${enc(S.run.run_id)}/rerun`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({skill:S.skill.id,case_ids:cases})});S.caseView=null;await followRun(x.run_id)}catch(e){showError(e)}}
async function openCase(id,candidate=null,repetition=null,push=true){try{S.focus={candidate:candidate||null,repetition:repetition||null,artifact:S.focus.artifact};S.caseView=await api(`/api/runs/${enc(S.run.run_id)}/cases/${enc(id)}?skill=${enc(S.skill.id)}`);render();syncUrl(push)}catch(e){showError(e)}}
function gradeHtml(grades){if(!grades?.length)return '<p class="muted">No grades recorded.</p>';return grades.map(g=>`<div class="criterion"><strong class="${esc(g.grade_status)}">${esc(g.grade_status)}</strong> · ${esc(g.metric||g.grader?.id||'criterion')}<div class="criterion-evidence">${esc(g.rationale||'')}</div>${(g.checks||[]).map(c=>`<div>${esc(c.name||'check')}: <strong class="${esc(c.label)}">${esc(c.label)}</strong> — ${esc(c.evidence||c.note||'')}</div>`).join('')}</div>`).join('')}
function artifactUrl(p,a){return `/api/artifacts/${enc(p.trial.trial_id)}/${a.path.split('/').map(enc).join('/')}?skill=${enc(S.skill.id)}&run=${enc(p.run_id)}`}
function bytes(v){if(v<1024)return `${v} B`;if(v<1048576)return `${(v/1024).toFixed(v<10240?1:0)} KB`;return `${(v/1048576).toFixed(1)} MB`}
function artifactKind(a){const ext=a.path.split('.').pop()?.toUpperCase();if(['XLSX','XLS','CSV','DOCX','DOC','PPTX','PPT','PDF','JSON','TXT','MD'].includes(ext))return ext;if(a.mime.startsWith('image/'))return 'IMAGE';return 'FILE'}
function noteHtml(a,context=''){return `<div class="note">${context?`<span class="note-context">${esc(context)}</span>`:''}${esc(a.note)}</div>`}
function artifactHtml(p){const items=p.artifacts||[];if(!items.length)return '<div class="artifact-empty">No files were produced for this version.</div>';return `<div class="artifacts">${items.map(a=>{const u=artifactUrl(p,a),notes=(p.annotations||[]).filter(n=>n.artifact==='artifact'&&n.artifact_path===a.path).map(n=>noteHtml(n)).join(''),head=`<div class="artifact-head"><div class="artifact-identity"><span class="artifact-kind">${artifactKind(a)}</span><span><span class="artifact-name" title="${esc(a.path)}">${esc(a.path)}</span><span class="artifact-meta">${bytes(a.bytes)}</span></span></div><a class="artifact-open" data-artifact-open="${esc(a.path)}" data-trial="${esc(p.trial.trial_id)}" href="${u}" target="_blank" rel="noreferrer">Open preview ↗</a></div>`;return `<section class="artifact" data-artifact-card="${esc(a.path)}">${head}${notes?`<div class="artifact-notes">${notes}</div>`:''}</section>`}).join('')}</div>`}
const diagnoses=[['candidate-failure','Skill method','The skill needs a reusable method or instruction change.'],['routing-failure','Routing or description','The skill should have been selected differently.'],['task-defect','Case definition','The task or expected behavior is wrong or unclear.'],['grader-defect','Judge or rubric','The grader judged the wrong thing.'],['harness-error','Runner or harness','Execution did not represent the intended environment.'],['environment-failure','Environment','A required tool, dependency, or permission was unavailable.'],['model-variance','Model variance','Repeat the same evidence before changing the skill.'],['expected-change','Expected change','The difference is intentional.'],['taste-rule','Reusable taste rule','Capture a general quality preference.'],['one-off','One-off note','Useful context that should not become a rule.']];
function diagnosisOptions(){return diagnoses.map(([id,label,help])=>`<option value="${id}" data-help="${esc(help)}">${esc(label)}</option>`).join('')}
function versionPanel(p){const responseNotes=(p.annotations||[]).filter(a=>a.artifact!=='artifact').map(a=>noteHtml(a,a.tag||a.artifact||'response')).join(''),kind=p.trial.candidate==='no-skill'?'version-baseline':p.trial.candidate==='current'?'version-current':'',focused=S.focus.candidate===p.trial.candidate&&(!S.focus.repetition||S.focus.repetition===p.trial.repetition),targets=[`<option value="response">Agent response</option>`,...(p.artifacts||[]).map(a=>`<option value="artifact:${esc(a.path)}">${esc(a.path)}</option>`)].join('');return `<article class="version ${kind} ${focused?'focused':''}" data-trial-card="${esc(p.trial.trial_id)}"><div class="version-head"><div><div class="version-name">${esc(p.candidate_display||p.trial.candidate)}</div><div class="version-meta">${esc(p.trial.candidate)} · repetition ${p.trial.repetition}</div></div>${state(p.trial.verdict)}</div><div class="section-label">Produced files · ${p.artifacts?.length||0}</div>${artifactHtml(p)}<div class="section-label">Agent response</div><div class="output">${esc(p.response||'No response recorded.')}</div><details class="grades" ${p.trial.verdict!=='passed'?'open':''}><summary>Judge results · ${p.grades?.length||0} grades</summary><div class="grade-list">${gradeHtml(p.grades)}</div></details><div class="feedback"><div class="section-label">Feedback</div><label for="target-${esc(p.trial.trial_id)}">Feedback about</label><select id="target-${esc(p.trial.trial_id)}" data-note-target="${esc(p.trial.trial_id)}">${targets}</select><div class="diagnosis"><label for="tag-${esc(p.trial.trial_id)}">What does this evidence indicate?</label><select id="tag-${esc(p.trial.trial_id)}" data-note-tag="${esc(p.trial.trial_id)}">${diagnosisOptions()}</select><small data-tag-help="${esc(p.trial.trial_id)}">${esc(diagnoses[0][2])}</small></div><label for="note-${esc(p.trial.trial_id)}">Finding</label><div data-response-notes="${esc(p.trial.trial_id)}">${responseNotes}</div><textarea id="note-${esc(p.trial.trial_id)}" data-note="${esc(p.trial.trial_id)}" placeholder="Describe the evidence and the change it supports."></textarea><div class="feedback-row"><button class="btn" data-save-note="${esc(p.trial.trial_id)}">Save finding</button><span class="save-state" id="saved-${esc(p.trial.trial_id)}" aria-live="polite"></span></div></div></article>`}
function reviewCases(){return [...(S.run.cases||[])].sort((a,b)=>casePriority(S.run,a)-casePriority(S.run,b)||a.eval_id.localeCompare(b.eval_id)).filter(c=>S.filter==='all'||casePriority(S.run,c)<3)}
function caseIndex(){return reviewCases().findIndex(c=>c.eval_id===S.caseView.eval_id)}
function promoteForm(c){const trial=c.trials.find(p=>p.trial.candidate===S.focus.candidate&&(!S.focus.repetition||p.trial.repetition===S.focus.repetition))||c.trials.find(p=>p.trial.verdict!=='passed')||c.trials[0],id=`${c.eval_id}-regression`.replace(/[^a-zA-Z0-9._-]+/g,'-');return `<details class="promote"><summary>Add this failure as a regression case</summary><h3>Preserve the evidence before revising the skill</h3><div class="promote-grid">${field('Case ID',`<input id="promote-id" value="${esc(id)}">`)}${field('Expected behavior',`<input id="promote-expectation" placeholder="What must the revised skill do?">`)}</div><input id="promote-trial" type="hidden" value="${esc(trial.trial.trial_id)}"><label class="check"><input id="promote-notes" type="checkbox" checked><span>Include the findings attached to this output</span></label><div class="promote-actions"><button class="btn primary" id="promote">Add regression case</button><span class="save-state" id="promoted" aria-live="polite"></span></div></details>`}
function renderCase(){const c=S.caseView,i=caseIndex(),total=reviewCases().length||1,body=`<div class="review-head"><button class="back" id="back">← Case matrix</button><h2>${esc(c.eval_id)}</h2><span class="progress">${i+1} of ${total}</span></div><section class="task-card"><div class="section-label">Prompt</div><div class="task-body">${esc(c.task||'')}</div></section>${promoteForm(c)}<div class="comparison">${c.trials.map(versionPanel).join('')}</div><nav class="review-nav" aria-label="Case navigation"><button class="btn" id="prev" ${i<=0?'disabled':''}>← Previous</button><button class="btn" id="matrix">Case matrix</button><button class="btn" id="next" ${i>=total-1?'disabled':''}>Next →</button></nav>`;$('#app').innerHTML=shell(body);bindShell();$('#back').onclick=$('#matrix').onclick=()=>{S.caseView=null;S.focus={candidate:null,repetition:null,artifact:null};render();syncUrl(true)};$('#prev').onclick=()=>navigateCase(-1);$('#next').onclick=()=>navigateCase(1);$('#promote').onclick=promoteCase;document.querySelectorAll('[data-save-note]').forEach(b=>b.onclick=()=>saveNote(b.dataset.saveNote));document.querySelectorAll('[data-note-tag]').forEach(s=>s.onchange=()=>{document.querySelector(`[data-tag-help="${CSS.escape(s.dataset.noteTag)}"]`).textContent=s.selectedOptions[0].dataset.help});document.querySelectorAll('[data-artifact-open]').forEach(a=>a.onclick=()=>{const p=c.trials.find(x=>x.trial.trial_id===a.dataset.trial);S.focus={candidate:p.trial.candidate,repetition:p.trial.repetition,artifact:a.dataset.artifactOpen};syncUrl()});const focused=document.querySelector('.version.focused'),artifact=focused&&S.focus.artifact?focused.querySelector(`[data-artifact-card="${CSS.escape(S.focus.artifact)}"]`):null,target=artifact||focused;if(target)setTimeout(()=>target.scrollIntoView({block:'nearest'}),0)}
function navigateCase(delta){const i=caseIndex()+delta,c=reviewCases()[i];if(c)openCase(c.eval_id)}
async function saveNote(trial){try{const input=document.querySelector(`[data-note="${CSS.escape(trial)}"]`),target=document.querySelector(`[data-note-target="${CSS.escape(trial)}"]`),tag=document.querySelector(`[data-note-tag="${CSS.escape(trial)}"]`).value,note=input.value.trim();if(!note)throw Error('Write a finding first.');const isArtifact=target.value.startsWith('artifact:'),artifactPath=isArtifact?target.value.slice(9):null,body={skill:S.skill.id,run:S.run.run_id,trial_id:trial,note,tag,artifact:isArtifact?'artifact':'response'};if(artifactPath)body.artifact_path=artifactPath;const saved=await api('/api/annotations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}),packet=S.caseView.trials.find(p=>p.trial.trial_id===trial);packet.annotations.push(saved.annotation);input.value='';const panel=target.closest('.version'),destination=isArtifact?panel.querySelector(`[data-artifact-card="${CSS.escape(artifactPath)}"]`):panel.querySelector(`[data-response-notes="${CSS.escape(trial)}"]`);if(isArtifact){let notes=destination.querySelector('.artifact-notes');if(!notes){notes=document.createElement('div');notes.className='artifact-notes';destination.append(notes)}notes.insertAdjacentHTML('beforeend',noteHtml(saved.annotation,tag))}else destination.insertAdjacentHTML('beforeend',noteHtml(saved.annotation,tag));document.getElementById(`saved-${trial}`).textContent='Saved';setStatus('Finding saved')}catch(e){showError(e)}}
async function promoteCase(){try{const expectation=$('#promote-expectation').value.trim();if(!expectation)throw Error('Describe the expected behavior first.');const body={skill:S.skill.id,run:S.run.run_id,trial_id:$('#promote-trial').value,id:$('#promote-id').value.trim(),type:'regression',priority:'high',expectations:[expectation],include_annotations:$('#promote-notes').checked,approved:true};const x=await api('/api/evals',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});$('#promoted').textContent=`Added ${x.eval.id}`;setStatus('Regression case added');const suite=await api(`/api/skills/${enc(S.skill.id)}/suite`);S.suite=suite}catch(e){showError(e)}}
function showError(e){setStatus(e.message);console.error(e)}
document.addEventListener('keydown',e=>{if(!S.caseView||['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName))return;if(e.key==='ArrowLeft')navigateCase(-1);if(e.key==='ArrowRight')navigateCase(1)});
addEventListener('popstate',()=>location.reload());
boot();
</script>
</body>
</html>
