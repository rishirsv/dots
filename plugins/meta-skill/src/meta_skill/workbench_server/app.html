<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MetaSkill Workbench</title>
<style>
:root{--bg:#f5f6f2;--panel:#fff;--ink:#172019;--muted:#69736c;--line:#d8ded8;--soft:#edf1ed;--green:#16784a;--red:#b2392f;--amber:#906408;--blue:#1d5eaa;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;--sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden}body{background:var(--bg);color:var(--ink);font:13px/1.45 var(--sans)}button,select,input,textarea{font:inherit;color:inherit}button{cursor:pointer}.top{height:48px;display:flex;align-items:center;gap:14px;padding:0 16px;background:var(--ink);color:#fff}.brand{font-weight:750;letter-spacing:-.02em}.root{font:11px var(--mono);color:#afbab1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.status{margin-left:auto;color:#c1cac3;font-size:12px}.shell{height:calc(100vh - 48px);display:grid;grid-template-columns:226px minmax(0,1fr)}.rail{border-right:1px solid var(--line);background:#edf0ec;overflow:auto;padding:12px 8px}.label,.rail h2{font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);font-weight:750;margin:6px 8px}.skill{width:100%;border:0;background:transparent;text-align:left;padding:9px 10px;border-radius:4px;margin:1px 0}.skill:hover{background:#e2e7e2}.skill.active{background:var(--ink);color:#fff}.skill strong{display:block}.skill small{display:flex;justify-content:space-between;color:var(--muted);margin-top:2px}.skill.active small{color:#b8c2ba}.dot{color:#e78378}.main{min-width:0;overflow:auto}.hero{padding:20px 24px 0;border-bottom:1px solid var(--line);background:var(--panel)}.hero-row{display:flex;align-items:flex-end;gap:20px;padding-bottom:15px}.hero h1{font-size:24px;letter-spacing:-.04em;margin:0}.hero p{margin:3px 0 0;color:var(--muted);max-width:720px}.actions{margin-left:auto;display:flex;gap:6px;align-items:center}.tabs{display:flex;gap:22px}.tab{border:0;border-bottom:2px solid transparent;background:transparent;padding:9px 0 10px;color:var(--muted)}.tab.active{border-color:var(--ink);color:var(--ink);font-weight:700}.content{padding:18px 24px 40px}.btn,select,input,textarea{border:1px solid var(--line);background:#fff;border-radius:4px;padding:7px 9px}.btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}.btn.danger{color:var(--red)}.btn:disabled{opacity:.45;cursor:not-allowed}.empty{border:1px dashed #b8c0b9;padding:34px;text-align:center;color:var(--muted)}.error{color:var(--red)}.metrics{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));border:1px solid var(--line);background:var(--panel);margin-bottom:18px}.metric{padding:13px 15px;border-right:1px solid var(--line)}.metric:last-child{border:0}.metric b{font:23px/1 var(--mono);display:block;margin-bottom:5px}.metric span{color:var(--muted)}.good{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--amber)}table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line)}th,td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:#f0f3f0}tr[data-run],tr[data-trial],tr[data-pair]{cursor:pointer}tr[data-run]:hover,tr[data-trial]:hover,tr[data-pair]:hover{background:#f5f7f5}.mono{font-family:var(--mono);font-size:11px}.pill{display:inline-block;border:1px solid var(--line);border-radius:99px;padding:1px 6px;font-size:11px;white-space:nowrap}.section-head{display:flex;align-items:center;gap:8px;margin:22px 0 8px}.section-head:first-child{margin-top:0}.section-head h2{font-size:14px;margin:0}.section-head .spacer{margin-left:auto}.back{border:0;background:none;padding:0;color:var(--blue)}.setup{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:18px}.form{background:var(--panel);border:1px solid var(--line);padding:18px}.field{display:grid;gap:5px;margin-bottom:14px}.field>span{font-size:11px;font-weight:700}.field small,.hint{color:var(--muted)}.field input,.field textarea,.field select{width:100%}.field textarea{min-height:92px;resize:vertical}.checks{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:5px 14px}.check{display:flex;gap:7px;align-items:flex-start}.check input{width:auto;margin-top:3px}.boundary{border:1px solid var(--line);background:#f0f3f0;padding:14px;align-self:start}.boundary h3{margin:0 0 8px;font-size:12px}.boundary dl{margin:0}.boundary dt{font-size:10px;text-transform:uppercase;color:var(--muted);margin-top:9px}.boundary dd{margin:1px 0}.config{background:var(--panel);border:1px solid var(--line);padding:12px}.review-index{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px}.queue-card{background:var(--panel);border:1px solid var(--line);padding:14px}.queue-card h2{font-size:14px;margin:0 0 4px}.queue-card p{color:var(--muted);margin:0 0 12px}.review{display:grid;grid-template-columns:230px minmax(420px,1fr) 310px;height:calc(100vh - 48px)}.queue,.grade{background:var(--panel);overflow:auto;padding:12px;border-right:1px solid var(--line)}.grade{border-left:1px solid var(--line);border-right:0}.evidence{overflow:auto;padding:18px 24px}.q{width:100%;border:0;background:transparent;text-align:left;padding:8px;border-radius:4px}.q:hover,.q.active{background:var(--soft)}.q small{display:block;color:var(--muted)}.evidence h2{font-size:18px;margin:0 0 14px}.evidence h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:22px 0 7px}.prose,.transcript,.artifact-frame{white-space:pre-wrap;background:var(--panel);border:1px solid var(--line);padding:13px;max-height:440px;overflow:auto}.transcript{font:11px/1.5 var(--mono)}.artifact-list{display:grid;gap:8px}.artifact{border:1px solid var(--line);background:var(--panel);padding:10px}.artifact img{display:block;max-width:100%;max-height:520px;margin-top:8px}.artifact iframe{width:100%;height:420px;border:1px solid var(--line);margin-top:8px}.grade textarea{width:100%;min-height:90px}.labels{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:8px 0}.labels button{border:1px solid var(--line);background:#fff;padding:7px;border-radius:4px}.labels button.selected{border-color:var(--ink);background:var(--ink);color:#fff}.judge{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}.annotations{display:grid;gap:6px}.annotation{border-left:3px solid var(--amber);padding:5px 8px;background:var(--soft)}.pair-review{height:calc(100vh - 48px);overflow:auto;padding:18px 24px}.pair-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}.pair-head h1{font-size:19px;margin:0}.pair-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.pair-panel{background:var(--panel);border:1px solid var(--line);min-width:0}.pair-panel h2{font-size:12px;margin:0;padding:10px 12px;border-bottom:1px solid var(--line)}.pair-panel .prose{border:0;max-height:none}.pair-controls{position:sticky;bottom:0;background:rgba(245,246,242,.97);border-top:1px solid var(--line);padding:12px 0;margin-top:14px}.preference{display:flex;gap:6px;flex-wrap:wrap}.preference button.selected{background:var(--ink);color:#fff}.reveal{margin-top:10px;color:var(--muted)}.promote{border-top:1px solid var(--line);margin-top:16px;padding-top:12px}.muted{color:var(--muted)}
@media(max-width:900px){.setup,.review-index{grid-template-columns:1fr}.review{grid-template-columns:190px minmax(340px,1fr) 280px}.pair-grid{grid-template-columns:1fr}}
@media(max-width:760px){html,body{overflow:auto}.top{position:sticky;top:0;z-index:3}.shell{height:auto;display:block}.rail{border:0;border-bottom:1px solid var(--line);display:flex;gap:4px;overflow:auto;padding:7px}.rail h2{display:none}.skill{min-width:155px}.hero{padding:14px 14px 0}.hero-row{display:block}.actions{margin-top:12px}.content{padding:12px}.metrics{grid-template-columns:1fr 1fr}.metric:nth-child(2){border-right:0}.review{height:auto;display:block}.queue,.grade,.evidence{overflow:visible;border:0;border-bottom:1px solid var(--line)}.queue{display:flex;overflow:auto}.q{min-width:180px}.evidence{padding:14px}.prose,.transcript{max-height:none}.root{display:none}.checks{grid-template-columns:1fr}.pair-review{height:auto;padding:14px}}
@media(max-width:420px){.top{padding:0 10px}.hero h1{font-size:20px}.metrics{grid-template-columns:1fr}.metric{border-right:0;border-bottom:1px solid var(--line)}th.optional,td.optional{display:none}.content{overflow-x:hidden}.review{min-width:0}.evidence{min-width:0}.prose,.transcript{overflow-wrap:anywhere}.labels{grid-template-columns:1fr}.tabs{gap:15px;overflow:auto}.actions{display:grid;grid-template-columns:1fr 1fr}.pair-controls .field{margin-bottom:8px}}
</style>
</head>
<body>
<header class="top"><div class="brand">MetaSkill</div><div class="root" id="root"></div><div class="status" id="status">Loading…</div></header>
<div id="app"></div>
<script>
const S={skills:[],skill:null,suite:null,runs:[],run:null,reviewRunId:null,queue:[],pairs:null,trial:null,pair:null,tab:'evals',setup:null,label:null,preference:null};
const $=s=>document.querySelector(s);const enc=encodeURIComponent;
async function api(path,opts){const r=await fetch(path,opts);const type=r.headers.get('content-type')||'';const j=type.includes('json')?await r.json():null;if(!r.ok)throw Error(j?.error||'Request failed');return j}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function setStatus(v){$('#status').textContent=v}
function candidateId(row){return row.candidate||''}
async function boot(){try{const x=await api('/api/skills');S.skills=x.skills;$('#root').textContent=x.root;S.skill=S.skills.find(s=>s.suite_ready)||S.skills[0];await loadSkill();render();setStatus('Ready')}catch(e){showError(e)}}
async function loadSkill(){S.run=S.trial=S.pair=null;S.pairs=null;if(!S.skill){S.suite=null;S.runs=[];return}const jobs=[api(`/api/skills/${enc(S.skill.id)}/runs`)];if(S.skill.suite_ready)jobs.push(api(`/api/skills/${enc(S.skill.id)}/suite`));const out=await Promise.all(jobs);S.runs=out[0].runs;S.suite=out[1]||null}
function rail(){return `<aside class="rail"><h2>Skills</h2>${S.skills.map(s=>`<button class="skill ${S.skill?.id===s.id?'active':''}" data-skill="${esc(s.id)}"><strong>${esc(s.name)}</strong><small><span>${s.eval_count} evals · ${s.run_count} runs</span><span class="${s.attention?'dot':''}">${s.attention||''}</span></small></button>`).join('')}</aside>`}
function tabs(){return `<nav class="tabs" aria-label="Workbench sections">${['evals','experiments','review'].map(t=>`<button class="tab ${S.tab===t?'active':''}" data-tab="${t}">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}</nav>`}
function shell(content,actions=''){const s=S.skill;return `<div class="shell">${rail()}<main class="main"><header class="hero"><div class="hero-row"><div><h1>${esc(s?.name||'MetaSkill')}</h1><p>${esc(s?.description||s?.path||'No skills found under this root.')}</p></div><div class="actions">${actions}</div></div>${s?tabs():''}</header><div class="content">${content}</div></main></div>`}
function render(){if(S.pair)return renderPair();if(S.trial)return renderTrial();if(S.run)return renderRun();if(S.setup)return renderSetup();if(!S.skill){$('#app').innerHTML=shell('<div class="empty">No skills found under this root.</div>');return}if(S.tab==='experiments')return renderExperiments();if(S.tab==='review')return renderReviewIndex();return renderEvals()}
function bindShell(){document.querySelectorAll('[data-skill]').forEach(b=>b.onclick=async()=>{S.skill=S.skills.find(s=>s.id===b.dataset.skill);S.tab='evals';S.setup=null;await loadSkill();render()});document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;S.run=S.trial=S.pair=null;render()})}
function noSuite(){return `<div class="empty">No evaluation suite. Create one with <span class="mono">metaskill init --evals ${esc(S.skill.path)}</span>, or run an ad hoc eval.</div>`}
function renderEvals(){const s=S.suite;const actions=`<button class="btn" id="adhoc">Ad hoc eval</button><button class="btn primary" id="newexp" ${s?'':'disabled'}>New experiment</button>`;let body=!s?noSuite():`<div class="metrics"><div class="metric"><b>${s.cases.length}</b><span>evals</span></div><div class="metric"><b>${s.cases.filter(c=>c.type==='regression').length}</b><span>regression evals</span></div><div class="metric"><b>${s.cases.filter(c=>c.priority==='high').length}</b><span>high priority</span></div><div class="metric"><b>${s.latest_run?'1':'0'}</b><span>latest experiment</span></div></div><div class="section-head"><h2>Evaluation suite</h2><span class="muted">${esc(s.objective||'No suite objective recorded.')}</span></div><table><thead><tr><th>Eval</th><th>Type</th><th>Priority</th><th>Graders</th><th>Latest outcomes</th><th class="optional">Task</th></tr></thead><tbody>${s.cases.map(c=>`<tr><td class="mono">${esc(c.id)}</td><td>${esc(c.type)}</td><td><span class="pill">${esc(c.priority)}</span></td><td>${c.graders.length?c.graders.map(g=>`${esc(g.kind)}:${esc(g.metric||g.id||'')}`).join('<br>'):'—'}</td><td>${Object.entries(c.latest_outcomes||{}).map(([k,v])=>`${esc(k)}: <span class="${v==='passed'?'good':v==='failed'?'bad':'warn'}">${esc(v)}</span>`).join('<br>')||'—'}</td><td class="optional">${esc(c.prompt_preview)}</td></tr>`).join('')}</tbody></table>`;$('#app').innerHTML=shell(body,actions);bindShell();$('#adhoc').onclick=()=>{S.setup='adhoc';render()};$('#newexp')?.addEventListener('click',()=>{S.setup='experiment';render()})}
function renderExperiments(){const actions=`<button class="btn primary" id="newexp" ${S.suite?'':'disabled'}>New experiment</button>`;const body=!S.runs.length?'<div class="empty">No experiments recorded for this skill.</div>':`<div class="section-head"><h2>Experiments</h2><span class="muted">Immutable runs of a selected suite and candidate configuration.</span></div><table><thead><tr><th>Experiment</th><th>Profile</th><th>Candidates</th><th>Delta</th><th>Verdicts</th><th>Review</th></tr></thead><tbody>${S.runs.map(r=>`<tr data-run="${esc(r.run_id)}"><td>${r.objective?`<strong>${esc(r.objective)}</strong><br>`:''}<span class="mono">${esc(r.run_id)}</span><br><span class="muted">${esc(r.created_at||'')}</span></td><td>${esc(r.profile||'all evals')}</td><td>${esc((r.candidates||[]).join(' vs '))}</td><td><span class="good">+${r.delta_totals?.improved||0}</span> <span class="bad">−${r.delta_totals?.regressed||0}</span></td><td>${r.totals?.passed||0} pass · ${r.totals?.failed||0} fail</td><td>${r.review?.reviewed||0}/${r.review?.total||0} absolute<br>${r.pairwise_review?.reviewed||0} pairwise</td></tr>`).join('')}</tbody></table>`;$('#app').innerHTML=shell(body,actions);bindShell();bindRuns();$('#newexp')?.addEventListener('click',()=>{S.setup='experiment';render()})}
function field(label,control,hint=''){return `<label class="field"><span>${label}</span>${control}${hint?`<small>${hint}</small>`:''}</label>`}
function renderSetup(){const adhoc=S.setup==='adhoc',s=S.suite;const candidateChecks=!adhoc&&s?s.candidates.map((c,i)=>`<label class="check"><input type="checkbox" name="candidate" value="${esc(candidateId(c))}" ${i<2?'checked':''}><span>${esc(c.display||candidateId(c))}<small class="muted">${esc(candidateId(c))}</small></span></label>`).join(''):'';const caseChecks=!adhoc&&s?s.cases.map(c=>`<label class="check"><input type="checkbox" name="case" value="${esc(c.id)}" checked><span>${esc(c.id)} <small class="muted">${esc(c.type)} · ${esc(c.priority)}</small></span></label>`).join(''):'';const boundary=s?.data_boundary||{runner:'codex_app_server',storage_root:'.metaskill',sandbox:'workspace_write',approval_policy:'deny_all',tools:'Codex runtime defaults',network:'Codex runtime default',external_model_boundary:true};const form=adhoc?`${field('Task','<textarea id="task" placeholder="Enter one realistic task"></textarea>')}${field('Expected output (optional)','<textarea id="expected" placeholder="Reference output or acceptance target"></textarea>')}${field('Expectations (one per line)','<textarea id="expectations" placeholder="Claims are supported\nThe answer follows the requested format"></textarea>')}<div class="checks">${field('Eval type','<select id="evaltype"><option>capability</option><option>regression</option><option>failure</option><option>gate</option></select>')}${field('Priority','<select id="priority"><option>medium</option><option>high</option><option>low</option></select>')}</div>`:`${field('Evaluation objective',`<input id="objective" value="${esc(s.objective||'') }" placeholder="What should this experiment establish?">`)}${field('Profile',`<select id="profile"><option value="">All evals</option>${Object.keys(s.profiles||{}).map(p=>`<option>${esc(p)}</option>`).join('')}</select>`)}${field('Cases',`<div class="checks">${caseChecks}</div>`)}${field('Candidates',`<div class="checks">${candidateChecks}</div>`)}<div class="checks">${field('Baseline',`<select id="baseline">${s.candidates.map(c=>`<option value="${esc(candidateId(c))}" ${((c.source||{}).kind==='none')?'selected':''}>${esc(c.display||candidateId(c))}</option>`).join('')}</select>`)}${field('Repetitions','<input id="repetitions" type="number" min="1" value="1">')}${field('Human review sample','<input id="sample" type="number" min="0" value="1">','Routine pass comparisons; high-risk cases are always selected.')}${field('Model','<input id="model" placeholder="Runtime default">')}</div><details><summary>Advanced execution</summary><div class="checks" style="margin-top:10px">${field('Parallel trials','<input id="parallel" type="number" min="1" value="1">')}${field('Timeout seconds','<input id="timeout" type="number" min="1" value="600">')}<label class="check"><input id="nograde" type="checkbox"><span>Disable grading</span></label></div></details>`;const body=`<button class="back" id="cancel">← ${adhoc?'Evals':'Experiments'}</button><div class="section-head"><h2>${adhoc?'Ad hoc eval':'New experiment'}</h2></div><div class="setup"><form class="form" id="setupform">${form}<button class="btn primary" type="submit">${adhoc?'Run ad hoc eval':'Start experiment'}</button></form><aside class="boundary"><h3>Execution boundary</h3><dl><dt>Runner</dt><dd>${esc(boundary.runner)}</dd><dt>Model boundary</dt><dd>${boundary.external_model_boundary?'Inputs and grader evidence may be sent to the external Codex model.':'Local only'}</dd><dt>Local storage</dt><dd class="mono">${esc(boundary.storage_root)}</dd><dt>Sandbox / approval</dt><dd>${esc(boundary.sandbox)} / ${esc(boundary.approval_policy)}</dd><dt>Tools</dt><dd>${esc(boundary.tools)}</dd><dt>Network</dt><dd>${esc(boundary.network)}</dd></dl></aside></div>`;$('#app').innerHTML=shell(body);bindShell();$('#cancel').onclick=()=>{S.setup=null;S.tab=adhoc?'evals':'experiments';render()};$('#setupform').onsubmit=launchSetup}
async function launchSetup(e){e.preventDefault();try{setStatus('Starting evaluation…');let body={skill:S.skill.id};if(S.setup==='adhoc'){body={...body,adhoc:true,task:$('#task').value,expected_output:$('#expected').value||null,expectations:$('#expectations').value.split('\n').map(x=>x.trim()).filter(Boolean),eval_type:$('#evaltype').value,priority:$('#priority').value}}else{const candidates=[...document.querySelectorAll('input[name=candidate]:checked')].map(x=>x.value);const cases=[...document.querySelectorAll('input[name=case]:checked')].map(x=>x.value);body={...body,objective:$('#objective').value||null,profile:$('#profile').value||null,case_ids:cases,candidates,baseline:$('#baseline').value,repetitions:Number($('#repetitions').value),human_review_sample:Number($('#sample').value),model:$('#model').value||null,parallel:Number($('#parallel').value),timeout:Number($('#timeout').value),no_grade:$('#nograde').checked}}const x=await api('/api/runs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});S.setup=null;S.tab='experiments';setStatus(`Run ${x.run_id} started`);setTimeout(async()=>{await loadSkill();await openRun(x.run_id)},700)}catch(e){showError(e)}}
function bindRuns(){document.querySelectorAll('[data-run]').forEach(r=>r.onclick=()=>openRun(r.dataset.run))}
async function openRun(id){try{setStatus('Loading experiment…');S.run=await api(`/api/runs/${enc(id)}?skill=${enc(S.skill.id)}`);S.reviewRunId=id;const [q,p]=await Promise.all([api(`/api/runs/${enc(id)}/queue?skill=${enc(S.skill.id)}`),api(`/api/runs/${enc(id)}/pairs?skill=${enc(S.skill.id)}`)]);S.queue=q.queue;S.pairs=p;setStatus(S.run.terminal?'Run complete':'Run in progress');render()}catch(e){showError(e)}}
function renderRun(){const r=S.run;const actions=`<button class="btn" id="refresh">Refresh</button><button class="btn" id="regrade" ${r.terminal&&!r.planning_error?'':'disabled'}>Regrade</button>`;const comparisons=r.comparisons.length?`<table><thead><tr><th>Eval</th><th>Candidate</th><th>Baseline</th><th>Candidate</th><th>Delta</th></tr></thead><tbody>${r.comparisons.map(x=>`<tr><td class="mono">${esc(x.eval_id)}</td><td>${esc(x.candidate)}</td><td>${esc(x.baseline_state)}</td><td>${esc(x.candidate_state)}</td><td class="${x.delta==='improved'?'good':x.delta==='regressed'?'bad':'warn'}">${esc(x.delta)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">No candidate comparison is available.</div>';const body=`<button class="back" id="back">← Experiments</button><div class="section-head"><h2>${esc(r.objective||'Evaluation run')}</h2><span class="mono muted">${esc(r.run_id)}</span><span class="spacer"></span>${S.pairs?.coverage?.selected?`<button class="btn" id="reviewpairs">Review ${S.pairs.coverage.unreviewed} comparisons</button>`:''}</div>${r.planning_error?`<div class="empty error">Experiment setup failed: ${esc(r.planning_error)}</div>`:''}<div class="metrics"><div class="metric"><b class="good">${r.delta_totals.improved||0}</b><span>improved</span></div><div class="metric"><b class="bad">${r.delta_totals.regressed||0}</b><span>regressed</span></div><div class="metric"><b>${r.totals.passed||0}/${r.totals.trials||0}</b><span>trials passed</span></div><div class="metric"><b>${r.review.reviewed}/${r.review.total}</b><span>absolute reviews</span></div></div><div class="section-head"><h2>Candidate comparison</h2></div>${comparisons}<div class="section-head"><h2>Trials</h2><span class="spacer"></span><button class="btn" id="rerun" ${r.trials.length?'':'disabled'}>Rerun selected</button></div><table><thead><tr><th></th><th>Trial</th><th>Runtime</th><th>Verdict</th><th>Evidence</th></tr></thead><tbody>${r.trials.map(t=>`<tr data-trial="${esc(t.trial_id)}"><td><input type="checkbox" name="rerun" value="${esc(t.eval_id)}" onclick="event.stopPropagation()"></td><td class="mono">${esc(t.trial_id)}</td><td>${esc(t.status)}</td><td class="${t.verdict==='passed'?'good':t.verdict==='failed'?'bad':'warn'}">${esc(t.verdict)}</td><td>${esc(t.failed_checks?.[0]?.evidence||t.error||'Open trial')}</td></tr>`).join('')}</tbody></table><details class="config" style="margin-top:16px"><summary>Experiment configuration and provenance</summary><p><b>Baseline:</b> ${esc(r.baseline_candidate||'none')} · <b>Model:</b> ${esc(r.model||'runtime default')} · <b>Profile:</b> ${esc(r.profile||'all evals')}</p><p class="mono">Suite digest: ${esc(r.suite_digest||'—')}</p>${(r.coverage_limits||[]).map(x=>`<p class="warn">${esc(x)}</p>`).join('')}</details>`;$('#app').innerHTML=shell(body,actions);bindShell();$('#back').onclick=()=>{S.run=null;S.tab='experiments';render()};$('#refresh').onclick=()=>openRun(r.run_id);$('#regrade').onclick=regrade;$('#reviewpairs')?.addEventListener('click',()=>{S.tab='review';S.run=null;renderReviewIndex()});$('#rerun').onclick=rerunSelected;document.querySelectorAll('[data-trial]').forEach(t=>t.onclick=()=>openTrial(t.dataset.trial))}
async function rerunSelected(){const ids=[...new Set([...document.querySelectorAll('input[name=rerun]:checked')].map(x=>x.value))];if(!ids.length)return showError(Error('Select at least one trial.'));try{const candidates=(S.run.candidates||[]).map(x=>x.candidate);const x=await api('/api/runs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({skill:S.skill.id,case_ids:ids,candidates,baseline:S.run.baseline_candidate,repetitions:1,source_run_id:S.run.run_id})});setStatus(`Run ${x.run_id} started`)}catch(e){showError(e)}}
async function regrade(){try{setStatus('Regrading…');await api(`/api/runs/${enc(S.run.run_id)}/regrade`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({skill:S.skill.id})});setTimeout(()=>openRun(S.run.run_id),700)}catch(e){showError(e)}}
async function renderReviewIndex(){if(!S.run&&S.runs.length)await openRun(S.runs[0].run_id);if(S.run)return renderReviewQueues();$('#app').innerHTML=shell('<div class="empty">No experiment is available for review.</div>');bindShell()}
function renderReviewQueues(){const p=S.pairs||{queue:[],coverage:{}};const pairRows=p.queue.length?`<table><thead><tr><th>Eval</th><th>Priority</th><th>Selection</th><th>Status</th></tr></thead><tbody>${p.queue.map(x=>`<tr data-pair="${esc(x.comparison_id)}"><td class="mono">${esc(x.eval_id)}</td><td>${esc(x.priority)}</td><td>${esc(x.selection_reasons.join(', '))}</td><td>${x.reviewed?'reviewed':'needs review'}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">No pairwise comparisons selected.</div>';const absRows=S.queue.length?`<table><thead><tr><th>Eval</th><th>Candidate</th><th>Verdict</th></tr></thead><tbody>${S.queue.map(x=>`<tr data-trial="${esc(x.trial_id)}"><td class="mono">${esc(x.eval_id)}</td><td>${esc(x.candidate)}</td><td>${esc(x.verdict)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">No absolute reviews.</div>';const body=`<div class="section-head"><h2>Review · ${esc(S.run.run_id)}</h2><span class="spacer"></span><button class="btn" id="chooserun">Choose experiment</button></div><div class="review-index"><section class="queue-card"><h2>Pairwise annotation queue</h2><p>${p.coverage.reviewed||0}/${p.coverage.selected||0} reviewed · ${esc(p.coverage.sampling_rule||'No sampling rule')}</p>${pairRows}</section><section class="queue-card"><h2>Absolute human review</h2><p>Declared human graders and single-trial adjudication.</p>${absRows}</section></div>`;S.run=null;$('#app').innerHTML=shell(body);bindShell();$('#chooserun').onclick=()=>{S.tab='experiments';renderExperiments()};document.querySelectorAll('[data-pair]').forEach(x=>x.onclick=()=>openPair(x.dataset.pair));document.querySelectorAll('[data-trial]').forEach(x=>x.onclick=()=>openTrialFromReview(x.dataset.trial))}
async function openPair(id){try{const run=S.reviewRunId||S.runs[0]?.run_id;S.pair=await api(`/api/comparisons/${enc(id)}?skill=${enc(S.skill.id)}&run=${enc(run)}`);S.pair.run_id=run;S.preference=S.pair.review?.preferred||null;render()}catch(e){showError(e)}}
function pairArtifacts(side,data){if(!data.artifacts?.length)return '';return `<div class="artifact-list" style="padding:10px">${data.artifacts.map(path=>{const u=`/api/comparison-artifacts/${enc(S.pair.comparison_id)}/${side}/${path.split('/').map(enc).join('/')}?skill=${enc(S.skill.id)}&run=${enc(S.pair.run_id)}`;return `<div class="artifact"><a href="${u}" target="_blank" rel="noreferrer">${esc(path)}</a></div>`}).join('')}</div>`}
function renderPair(){const p=S.pair;const reveal=p.reveal?`<div class="reveal">A: ${esc(p.reveal.a.candidate)} · B: ${esc(p.reveal.b.candidate)}</div>`:'<div class="reveal">Candidate identities remain hidden until the annotation is recorded.</div>';$('#app').innerHTML=`<div class="pair-review"><div class="pair-head"><button class="back" id="pairback">← Review queue</button><h1>${esc(p.eval_id)}</h1><span class="pill">pairwise review</span></div><h3>Task</h3><div class="prose">${esc(p.task||'No task recorded.')}</div><div class="pair-grid" style="margin-top:14px"><section class="pair-panel"><h2>Output A</h2>${pairArtifacts('a',p.a)}<div class="prose">${esc(p.a.response||'No response recorded.')}</div></section><section class="pair-panel"><h2>Output B</h2>${pairArtifacts('b',p.b)}<div class="prose">${esc(p.b.response||'No response recorded.')}</div></section></div><div class="pair-controls"><div class="preference">${[['a','A better'],['tie','Tie'],['b','B better'],['neither','Neither'],['unknown','Cannot judge']].map(([v,l])=>`<button class="btn ${S.preference===v?'selected':''}" data-pref="${v}">${l}</button>`).join('')}</div><div class="checks" style="margin-top:8px"><label class="field"><span>Primary reason</span><select id="pairreason">${['correctness','completeness','clarity','evidence','instruction-following','safety','style','other'].map(x=>`<option ${p.review?.reason===x?'selected':''}>${x}</option>`).join('')}</select></label><label class="field"><span>Rationale (optional)</span><input id="pairnote" value="${esc(p.review?.rationale||'')}"></label></div><button class="btn primary" id="savepair">${p.reviewed?'Revise annotation':'Record annotation'}</button>${reveal}</div></div>`;document.querySelectorAll('[data-pref]').forEach(b=>b.onclick=()=>{S.preference=b.dataset.pref;renderPair()});$('#pairback').onclick=()=>{S.pair=null;S.tab='review';renderReviewIndex()};$('#savepair').onclick=savePair}
async function savePair(){if(!S.preference)return showError(Error('Choose a preference.'));try{const run=S.pair.run_id;await api('/api/pairwise',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({skill:S.skill.id,run,comparison_id:S.pair.comparison_id,preferred:S.preference,reason:$('#pairreason').value,rationale:$('#pairnote').value})});S.pair=await api(`/api/comparisons/${enc(S.pair.comparison_id)}?skill=${enc(S.skill.id)}&run=${enc(run)}`);S.pair.run_id=run;renderPair()}catch(e){showError(e)}}
async function openTrialFromReview(id){const run=S.reviewRunId||S.runs[0]?.run_id;S.run=await api(`/api/runs/${enc(run)}?skill=${enc(S.skill.id)}`);await openTrial(id)}
async function openTrial(id){try{const run=S.run?.run_id||S.runs[0]?.run_id;S.trial=await api(`/api/trials/${enc(id)}?skill=${enc(S.skill.id)}&run=${enc(run)}`);S.trial.run_id=run;S.label=S.trial.human_grade?.grade_status||null;setStatus('Blind review');render()}catch(e){showError(e)}}
function artifactUrl(t,path){return `/api/artifacts/${enc(t.trial_id)}/${path.split('/').map(enc).join('/')}?skill=${enc(S.skill.id)}&run=${enc(S.trial.run_id)}`}
function artifactsHtml(p){if(!p.artifacts?.length)return '';return `<h3>Artifacts</h3><div class="artifact-list">${p.artifacts.map(a=>{const u=artifactUrl(p.trial,a.path);const preview=a.inline&&(a.mime.startsWith('image/')?`<img src="${u}" alt="${esc(a.path)}">`:a.mime==='application/pdf'?`<iframe src="${u}" title="${esc(a.path)}"></iframe>`:a.mime.startsWith('text/')||a.mime==='application/json'?`<iframe src="${u}" title="${esc(a.path)}"></iframe>`:'');return `<div class="artifact"><a href="${u}" target="_blank" rel="noreferrer">${esc(a.path)}</a> <span class="muted">${esc(a.mime)} · ${a.bytes} bytes</span>${preview}</div>`}).join('')}</div>`}
function renderTrial(){const p=S.trial,t=p.trial;const machine=p.grades.filter(g=>g.grader?.kind==='model');const machineHtml=machine.map(g=>`<p><b>${esc(g.grade_status)}</b> · ${esc(g.metric)}<br>${esc(g.rationale)}</p>`).join('');$('#app').innerHTML=`<div class="review"><aside class="queue"><button class="back" id="trialback">← Review</button><div class="label">Absolute review queue</div>${S.queue.map(q=>`<button class="q ${q.trial_id===t.trial_id?'active':''}" data-q="${esc(q.trial_id)}"><strong>${esc(q.eval_id)}</strong><small>${esc(q.candidate)} · ${esc(q.verdict)}</small></button>`).join('')}</aside><main class="evidence"><h2>${esc(t.eval_id)} <span class="pill">${esc(t.status)}</span></h2>${artifactsHtml(p)}<h3>Response</h3><div class="prose">${esc(p.response||'No response recorded.')}</div><h3>Task</h3><div class="prose">${esc(p.task||'No task recorded.')}</div><details><summary>Transcript and diagnostic evidence</summary><div class="transcript" style="margin-top:8px">${p.transcript.items.map(x=>`[${esc(x.method)}] ${esc(x.text)}`).join('\n\n')||'No transcript events.'}</div></details></main><aside class="grade"><div class="label">Human verdict</div>${p.human_grader?`<div class="mono">${esc(p.human_grader.id)} · ${esc(p.human_grader.metric)}</div><div class="labels">${['pass','partial','fail','unknown'].map(l=>`<button data-label="${l}" class="${S.label===l?'selected':''}">${l}</button>`).join('')}</div><textarea id="rationale" placeholder="Specific evidence and rationale…">${esc(p.human_grade?.rationale||'')}</textarea><button class="btn primary" id="save">${p.human_recorded?'Revise grade':'Commit blind grade'}</button>`:'<p class="warn">No human grader is declared for this eval.</p>'}<div class="judge" id="judge">${p.human_grader?(p.human_recorded?'<button class="btn" id="reveal">Reveal model judge</button>':'Model grade stays hidden until you commit.'):(machineHtml||'No model grade recorded.')}</div><div class="section-head"><h2>Annotations</h2></div><div class="annotations">${(p.annotations||[]).map(a=>`<div class="annotation"><b>${esc(a.tag)}</b><br>${esc(a.note)}</div>`).join('')||'<span class="muted">No annotations.</span>'}</div><select id="artifact" style="margin-top:9px"><option>response</option><option>artifact</option><option>transcript</option><option>task</option></select><select id="tag"><option>taste-rule</option><option>one-off</option><option>task-defect</option><option>grader-defect</option><option>harness-error</option><option>environment-failure</option><option>candidate-failure</option><option>expected-change</option></select><textarea id="note" placeholder="What should change?"></textarea><button class="btn" id="annotate">Add annotation</button>${S.run?.adhoc?promotionHtml():''}</aside></div>`;document.querySelectorAll('[data-q]').forEach(q=>q.onclick=()=>openTrial(q.dataset.q));document.querySelectorAll('[data-label]').forEach(b=>b.onclick=()=>{S.label=b.dataset.label;renderTrial()});$('#trialback').onclick=()=>{S.trial=null;S.run=null;S.tab='review';renderReviewIndex()};$('#save')?.addEventListener('click',saveGrade);$('#reveal')?.addEventListener('click',reveal);$('#annotate').onclick=annotate;$('#promote')?.addEventListener('click',promoteEval)}
function promotionHtml(){return `<div class="promote"><div class="label">Promote to suite</div><label class="field"><span>Eval ID</span><input id="promoteid" placeholder="known-failure"></label><label class="field"><span>Expectations (one per line)</span><textarea id="promoteexpect"></textarea></label><label class="field"><span>Priority</span><select id="promotepriority"><option>medium</option><option>high</option><option>low</option></select></label><button class="btn" id="promote">Promote with approval</button></div>`}
async function promoteEval(){if(!confirm('Add this task to the authored evaluation suite?'))return;try{await api('/api/evals',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({approved:true,skill:S.skill.id,run:S.trial.run_id,trial_id:S.trial.trial.trial_id,id:$('#promoteid').value,type:'regression',priority:$('#promotepriority').value,expectations:$('#promoteexpect').value.split('\n').map(x=>x.trim()).filter(Boolean),include_annotations:true})});setStatus('Eval promoted to suite')}catch(e){showError(e)}}
async function saveGrade(){try{if(!S.label)throw Error('Choose a label.');const rationale=$('#rationale').value.trim();if(!rationale)throw Error('Add evidence and rationale.');await api('/api/grades',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({skill:S.skill.id,run:S.trial.run_id,trial_id:S.trial.trial.trial_id,label:S.label,rationale})});await openTrial(S.trial.trial.trial_id)}catch(e){showError(e)}}
async function reveal(){try{const x=await api(`/api/trials/${enc(S.trial.trial.trial_id)}/judge?skill=${enc(S.skill.id)}&run=${enc(S.trial.run_id)}`);$('#judge').innerHTML=`<div class="label">Model judge</div>${x.grades.map(g=>`<p><b>${esc(g.grade_status)}</b> · ${esc(g.metric)}<br>${esc(g.rationale)}</p>`).join('')||'<p>No model grade.</p>'}<p>${x.disagreements.length?'Disagrees with your grade.':'Agrees with your grade.'}</p>`}catch(e){showError(e)}}
async function annotate(){try{const note=$('#note').value.trim();await api('/api/annotations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({skill:S.skill.id,run:S.trial.run_id,trial_id:S.trial.trial.trial_id,artifact:$('#artifact').value,tag:$('#tag').value,note})});await openTrial(S.trial.trial.trial_id);setStatus('Annotation saved')}catch(e){showError(e)}}
function showError(e){setStatus(e.message);console.error(e)}
boot();
</script>
</body>
</html>
