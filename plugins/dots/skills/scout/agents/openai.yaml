interface:
  display_name: "Scout"
  short_description: "Grill a fuzzy idea into build-ready context"
  icon_small: "../../assets/icon.png"
  icon_large: "../../assets/logo.png"
  brand_color: "#3B82F6"
  default_prompt: "Use $scout to turn this fuzzy idea into build-ready context. Ground facts directly, explore meaningful alternatives, recommend a direction, and finish with a compact decision snapshot. Stop before implementation."

policy:
  allow_implicit_invocation: false
