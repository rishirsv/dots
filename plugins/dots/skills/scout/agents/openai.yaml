interface:
  display_name: "Scout"
  short_description: "Grill a fuzzy idea into a decision snapshot"
  icon_small: "../../assets/icon.png"
  icon_large: "../../assets/logo.png"
  brand_color: "#3B82F6"
  default_prompt: "Use $scout to map this fuzzy idea's decision dependencies, ask two or three independent frontier questions per round, delegate every research task, explore meaningful alternatives, and finish with a user-confirmed decision snapshot before planning or implementation."

policy:
  allow_implicit_invocation: false
