interface:
  display_name: "Code Review"
  short_description: "Review, simplify, fix, or audit code"
  icon_small: "../../assets/icon.png"
  icon_large: "../../assets/logo.png"
  brand_color: "#3B82F6"
  default_prompt: "Use $code-review to review the selected scope against its intent, repository standards, correctness, and simplest sound implementation. Aggressively reject over-engineering. Fix confirmed issues in current work, keep standalone reviews report-only unless fixes are requested, and keep audits document-only."

policy:
  allow_implicit_invocation: false
