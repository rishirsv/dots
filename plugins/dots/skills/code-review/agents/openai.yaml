interface:
  display_name: "Code Review"
  short_description: "Evidence-backed review of code and plans"
  icon_small: "../../assets/icon.png"
  icon_large: "../../assets/logo.png"
  brand_color: "#3B82F6"
  default_prompt: "Use $code-review to review and fix the current changes. Ask independent reviewers to look for bugs, missed reuse and simplification, code quality issues, and inefficiencies. Verify their findings, make every safe fix within scope, and validate the result."

policy:
  allow_implicit_invocation: false
