interface:
  display_name: "Code Review"
  short_description: "Review, simplify, fix, or audit code"
  icon_small: "../../assets/icon.png"
  icon_large: "../../assets/logo.png"
  brand_color: "#3B82F6"
  default_prompt: "Use $code-review to run the Simplify process: parent runs Intent and Scope Conformance, Repository Standards Review, and Correctness Review while three parallel subagents run Reuse Review, Quality Review, and Efficiency Review. Aggressively reject over-engineering, fix confirmed issues in current work, keep standalone reviews report-only unless fixes are requested, and keep audits document-only."

policy:
  allow_implicit_invocation: false
