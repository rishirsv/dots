interface:
  display_name: "Code Review"
  short_description: "Review, simplify, and fix changed code"
  icon_small: "../../assets/icon.png"
  icon_large: "../../assets/logo.png"
  brand_color: "#3B82F6"
  default_prompt: "Use $code-review after coding to review the current diff for correctness, run the three Simplify lanes for reuse, quality, and efficiency, fix every confirmed in-scope issue, preserve intended behavior, and validate the result. For an audit, write the audit document and never action its findings."

policy:
  allow_implicit_invocation: false
