<!-- component: evidence-gallery
title: Evidence gallery
type: ui
when: Two to four screenshots or figures must be compared with readable,
  point-specific captions. One item may be the focal piece of evidence.
deps: theme.css
variants: equal grid (default) | focal first (.is-featured on one figure).
gotchas: Prefer two or three decisive images over a dense contact sheet. Do not
  put more than four items in one gallery; split larger evidence sets by claim.
  Do not rely on text baked into a scaled SVG: keep effective labels at least
  11px, move the claim into the caption, or provide a compact mobile
  composition. Embed images as data URIs or inline SVG and resize raster images
  close to their largest rendered width before encoding. Generated imagery is
  illustrative, never observed evidence; follow references/generated-images.md.
-->
<style>
  .evidence-gallery {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 20px;
    margin-bottom: var(--section);
  }
  .evidence-item { min-width: 0; margin: 0; }
  .evidence-item.is-featured { grid-column: 1 / -1; }
  .evidence-item img,
  .evidence-item svg {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 16 / 9;
    object-fit: contain;
    border: 1px solid var(--a12);
    border-radius: var(--r-card);
    background: var(--a4);
  }
  .evidence-item figcaption {
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 12px;
    line-height: 1.55;
  }
  @media (max-width: 680px) {
    .evidence-gallery { grid-template-columns: 1fr; gap: 18px; }
    .evidence-item.is-featured { grid-column: auto; }
  }
</style>

<div data-component="evidence-gallery" class="evidence-gallery">
  <figure class="evidence-item is-featured">
    <svg viewBox="0 0 960 540" role="img" aria-label="Desktop report showing a clear recommendation above supporting evidence">
      <rect width="960" height="540" fill="var(--a4)" />
      <rect x="120" y="64" width="720" height="412" rx="6" fill="var(--background)" stroke="var(--a20)" />
      <rect x="176" y="128" width="360" height="28" rx="4" fill="var(--foreground)" opacity=".82" />
      <rect x="176" y="184" width="608" height="112" rx="6" fill="var(--a8)" />
      <rect x="176" y="328" width="288" height="92" rx="6" fill="var(--a8)" />
      <rect x="496" y="328" width="288" height="92" rx="6" fill="var(--a8)" />
    </svg>
    <figcaption><strong>Desktop.</strong> The recommendation and its supporting evidence share the first reading frame.</figcaption>
  </figure>
  <figure class="evidence-item">
    <svg viewBox="0 0 640 360" role="img" aria-label="Mobile report with the title and status stacked cleanly">
      <rect width="640" height="360" fill="var(--a4)" />
      <rect x="204" y="24" width="232" height="312" rx="18" fill="var(--background)" stroke="var(--a20)" />
      <rect x="232" y="70" width="156" height="18" rx="4" fill="var(--foreground)" opacity=".82" />
      <rect x="232" y="104" width="56" height="18" rx="6" fill="var(--a12)" />
      <rect x="232" y="148" width="176" height="116" rx="6" fill="var(--a8)" />
    </svg>
    <figcaption><strong>Mobile.</strong> The status follows the title instead of competing for its last line.</figcaption>
  </figure>
  <figure class="evidence-item">
    <svg viewBox="0 0 640 360" role="img" aria-label="Dark mode report retaining contrast and hierarchy">
      <rect width="640" height="360" fill="var(--code-surface)" />
      <rect x="72" y="44" width="496" height="272" rx="6" fill="var(--background)" stroke="var(--a20)" />
      <rect x="112" y="92" width="248" height="20" rx="4" fill="var(--foreground)" opacity=".86" />
      <rect x="112" y="144" width="416" height="120" rx="6" fill="var(--a8)" />
    </svg>
    <figcaption><strong>Dark mode.</strong> Evidence surfaces retain their hierarchy without adding a second palette.</figcaption>
  </figure>
</div>
