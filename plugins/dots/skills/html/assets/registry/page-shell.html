<!-- component: page-shell
title: Page shell
type: block
when: Every page starts here. The document skeleton: header (context line,
  title, optional single status chip, dek), article column, and footer slot.
deps: theme.css (inline verbatim in <style> before component CSS)
variants: none — the shell is invariant; vary the content, not the frame.
gotchas: The status chip is the page's ONE allowed chip; omit it when there is
  no real status. The context line is a quiet breadcrumb, never an uppercase
  eyebrow. Replace slot comments with real content; keep section ids stable —
  the TOC rail targets them. Add page-behavior only when the page needs
  progressive enhancement.
-->
<style>
  .page {
    max-width: var(--article);
    margin: 0 auto;
    padding: 64px 24px 96px;
  }
  .page > header { margin-bottom: var(--section); }
  .context-line { font-size: 13px; color: var(--text-muted); margin: 0 0 20px; }
  .title-row {
    display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .title-row h1 { flex: 1 1 480px; min-width: 0; }
  .status {
    display: inline-flex; align-items: center; height: 20px; padding: 0 8px;
    border-radius: var(--r-pill); background: var(--a4); color: var(--a70);
    font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
    white-space: nowrap; border: 1px solid var(--a12);
  }
  .dek { font-size: 16px; color: var(--text-muted); margin: 0; max-width: 62ch; }
  footer.sources {
    margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--a12);
    font-size: 12px; color: var(--text-muted); line-height: 1.7;
  }
  footer.sources a { color: var(--text-muted); }
  @media (max-width: 680px) {
    .page { padding: 40px 24px 72px; }
    .title-row { display: block; }
    .title-row .status { margin-top: 10px; }
  }
</style>

<div data-component="page-shell" class="page">
  <header class="stagger">
    <p class="context-line">project / area</p>
    <div class="title-row">
      <h1>Document title</h1>
      <span class="status">draft</span>
    </div>
    <p class="dek">One-or-two-sentence dek: what this document is and the single decision or understanding it exists to drive.</p>
  </header>

  <!-- slot: toc-rail (optional, for 6+ sections or non-linear lookup) -->
  <!-- slot: sections — each <section id="..."> with an <h2> -->

  <footer class="sources">
    Sources: <!-- reader-facing sources, if needed -->
  </footer>
</div>
