<!-- component: theme-toggle
title: Theme toggle
type: ui
when: The artifact is a keeper worth letting the reader flip between light
  and dark themselves — a report that will be revisited, not a one-off
  scroll. Optional: prefers-color-scheme already serves readers with no JS.
deps: page-shell (its standard behavior script wires the click handler —
  reading data-theme, toggling it, and persisting the choice to
  localStorage; this file only provides the button markup and its CSS).
variants: none — fixed top-right placement is the only supported position.
gotchas: This is optional; add it only when flipping themes is genuinely
  useful to the reader. The button itself does nothing without page-shell's
  script — don't hand-roll a second click handler. Both icons are always in
  the DOM; CSS keyed on [data-theme] swaps which one is visible.
-->
<style>
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 36px;
    height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--a12);
    border-radius: var(--r-card);
    background: var(--background);
    color: var(--foreground);
    cursor: pointer;
    padding: 0;
    z-index: 10;
  }

  .theme-toggle:hover { background: var(--a4); }

  .theme-toggle-icon {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* default (no data-theme, or light): show moon as the "switch to dark" affordance */
  .theme-toggle-sun { display: none; }
  .theme-toggle-moon { display: block; }

  [data-theme="dark"] .theme-toggle-sun { display: block; }
  [data-theme="dark"] .theme-toggle-moon { display: none; }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) .theme-toggle-sun { display: block; }
    :root:not([data-theme]) .theme-toggle-moon { display: none; }
  }
</style>

<button data-component="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">
  <svg class="theme-toggle-icon theme-toggle-moon" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5Z" />
  </svg>
  <svg class="theme-toggle-icon theme-toggle-sun" viewBox="0 0 24 24" aria-hidden="true">
    <circle cx="12" cy="12" r="4.5" />
    <path d="M12 2.5v2M12 19.5v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2.5 12h2M19.5 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
  </svg>
</button>
