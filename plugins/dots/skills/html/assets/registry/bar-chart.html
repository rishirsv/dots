<!-- component: bar-chart
title: Bar chart
type: ui
when: Compare magnitudes across up to ~8 items — throughput by service,
  spend by team, latency by region. Reach for this when the shape of the
  comparison matters more than the exact digits.
deps: page-shell (theme.css + page-shell.js animate .reveal .bar-fill
  scaleX growth on scroll)
variants: default (all bars quiet --a20 fill) | one bar with .bar-fill.emphasis
  using --accent for the single value the reader should land on.
gotchas: Generate with scripts/chart.mjs (JSON spec in, this exact anatomy
  out, chart-spec comment embedded for later edits); hand-author only what
  the script can't express. theme.css + page-shell already animate
  `.reveal .bar-fill` growing from scaleX(0) once on scroll into view —
  wrap the chart markup in class="reveal" and set each bar's width as an
  inline style (style="width:62%"), never in a modifier class. When NOT a chart: one
  number alone belongs in stat-tiles, not a single bar; more than ~8
  categories belongs in a data-table instead of a wall of bars.
-->
<style>
  .chart-card {
    border: 1px solid var(--a12);
    border-radius: var(--r-card);
    padding: 20px 20px 16px;
    margin-bottom: var(--section);
  }

  .chart-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--a55);
    margin-bottom: 16px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .bar-row:last-child { margin-bottom: 0; }

  .bar-name {
    width: 148px;
    flex-shrink: 0;
    font-size: 13px;
    color: var(--a55);
  }

  .bar-track {
    flex: 1;
    background: var(--a4);
    border-radius: 4px;
    height: 18px;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--a20);
  }

  .bar-fill.emphasis { background: var(--accent); }

  .bar-value {
    width: 56px;
    text-align: right;
    flex-shrink: 0;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    color: var(--a55);
  }
</style>

<div data-component="bar-chart" class="chart-card reveal">
  <div class="chart-title">p95 latency by service (ms)</div>
  <div class="bar-row">
    <div class="bar-name">checkout-api</div>
    <div class="bar-track"><div class="bar-fill emphasis" style="width:88%"></div></div>
    <div class="bar-value">412</div>
  </div>
  <div class="bar-row">
    <div class="bar-name">catalog-api</div>
    <div class="bar-track"><div class="bar-fill" style="width:41%"></div></div>
    <div class="bar-value">190</div>
  </div>
  <div class="bar-row">
    <div class="bar-name">search</div>
    <div class="bar-track"><div class="bar-fill" style="width:55%"></div></div>
    <div class="bar-value">255</div>
  </div>
  <div class="bar-row">
    <div class="bar-name">auth</div>
    <div class="bar-track"><div class="bar-fill" style="width:22%"></div></div>
    <div class="bar-value">104</div>
  </div>
  <div class="bar-row">
    <div class="bar-name">notifications</div>
    <div class="bar-track"><div class="bar-fill" style="width:17%"></div></div>
    <div class="bar-value">78</div>
  </div>
</div>
