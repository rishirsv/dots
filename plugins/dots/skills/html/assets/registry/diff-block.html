<!-- component: diff-block
title: Diff block
type: ui
when: A before/after code change worth showing inline — a fix, a migration
  step, a config change — where the added/removed lines carry the point.
deps: code-panel
variants: default (mixed add/del/context lines) | all-context (no add/del,
  falls back to a plain code-panel — use that component directly instead).
gotchas: Keep hunks short, ≤15 lines — if the real diff is longer, show the
  meaningful slice and link to the full diff rather than pasting it all. Marks
  are a background tint plus a +/- glyph in a fixed-width gutter, never a
  left border stripe.
-->
<style>
  .diff-block {
    border: 1px solid var(--a12);
    border-radius: var(--r-code);
    overflow: hidden;
    margin-bottom: var(--section);
  }
  .diff-head {
    background: var(--code-surface);
    color: var(--code-ink);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    text-transform: lowercase;
    opacity: 0.6;
  }
  .diff-block pre {
    margin: 0;
    background: var(--code-surface);
    overflow-x: auto;
  }
  .diff-line {
    display: flex;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 20px;
    white-space: pre;
    padding: 0 20px;
  }
  .diff-gutter {
    display: inline-block;
    width: 16px;
    flex: none;
    color: var(--text-muted);
    color: rgba(237, 237, 237, 0.35);
  }
  .diff-line.ctx { color: var(--code-ink); }
  .diff-line.add {
    background: rgba(80, 200, 120, 0.12);
    color: var(--code-ink);
  }
  .diff-line.add .diff-gutter { color: rgba(120, 220, 150, 0.9); }
  .diff-line.del {
    background: rgba(220, 90, 80, 0.12);
    color: var(--code-ink);
  }
  .diff-line.del .diff-gutter { color: rgba(240, 130, 120, 0.9); }
</style>

<div data-component="diff-block" class="diff-block">
  <div class="diff-head">retry.config.ts</div>
  <pre><div class="diff-line ctx"><span class="diff-gutter"> </span>export const retryConfig = {</div><div class="diff-line del"><span class="diff-gutter">-</span>  maxAttempts: 3,</div><div class="diff-line add"><span class="diff-gutter">+</span>  maxAttempts: 5,</div><div class="diff-line del"><span class="diff-gutter">-</span>  baseDelayMs: 500,</div><div class="diff-line add"><span class="diff-gutter">+</span>  baseDelayMs: 200,</div><div class="diff-line add"><span class="diff-gutter">+</span>  jitter: "full",</div><div class="diff-line ctx"><span class="diff-gutter"> </span>  retryOn: ["ETIMEDOUT", "ECONNRESET", 429, 503],</div><div class="diff-line ctx"><span class="diff-gutter"> </span>};</div></pre>
</div>
