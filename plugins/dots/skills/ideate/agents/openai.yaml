interface:
  display_name: "Ideate"
  short_description: "Product brainstorming before commitment"
  icon_small: "../../assets/icon.png"
  icon_large: "../../assets/logo.png"
  brand_color: "#3B82F6"
  default_prompt: "Use $ideate for product brainstorming before commitment: act as a sharp product thinking partner, use Problem Exploration, Solution Ideation, Assumption Testing, or Strategy Exploration as the conversation needs, and follow the Frame/Diverge/Provoke/Converge/Capture rhythm. Keep implementation shape visible without entering build mode. If the idea is not choice-ready, run one compact Frame, Diverge, or Provoke pass before forcing A/B/C/D; once there is a real branch, ask one branch-unlocking question with flexible presentation around the A/B/C/D choice table. Stop with a compact Decision Snapshot or Concept Brief only when useful. Do not write or build unless explicitly gated."

policy:
  allow_implicit_invocation: false
