interface:
  display_name: "Ideate"
  short_description: "Sharpen ideas into shared language"
  icon_small: "../../assets/icon.png"
  icon_large: "../../assets/logo.png"
  brand_color: "#3B82F6"
  default_prompt: "Use $ideate to explore and sharpen this idea one question at a time, turn fuzzy terms into shared vocabulary, improve names, map branches, pressure the direction, and stop with a compact synthesis or concept brief only when useful. Do not write or build unless explicitly gated."

policy:
  allow_implicit_invocation: false
