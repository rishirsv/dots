<!-- component: wide-figure
title: Wide figure
type: ui
when: One screenshot, diagram, or evidence image needs more room than the
  article column while remaining readable at narrow widths.
deps: theme.css, page-shell
variants: default | contained (.is-contained keeps the figure in the article).
gotchas: Use one focal image, meaningful alt text, and a caption that says what
  the reader should notice. Embed images as data URIs or inline SVG; do not make
  external requests. Resize raster images near their largest rendered width
  before encoding instead of embedding an oversized original.
-->
<style>
  .wide-figure {
    width: min(1040px, calc(100vw - 48px));
    margin: 0 50% var(--section);
    transform: translateX(-50%);
  }
  .wide-figure.is-contained { width: 100%; margin-inline: 0; transform: none; }
  .wide-figure img,
  .wide-figure svg {
    display: block;
    width: 100%;
    height: auto;
    max-height: 720px;
    object-fit: contain;
    border: 1px solid var(--a12);
    border-radius: var(--r-card);
    background: var(--a4);
  }
  .wide-figure figcaption {
    max-width: 72ch;
    margin-top: 10px;
    color: var(--a55);
    font-size: 13px;
    line-height: 1.6;
  }
</style>

<figure data-component="wide-figure" class="wide-figure">
  <svg viewBox="0 0 1040 520" role="img" aria-label="Three-column comparison with the recommended middle option emphasized">
    <rect width="1040" height="520" fill="var(--a4)" />
    <rect x="64" y="84" width="264" height="352" rx="6" fill="var(--background)" stroke="var(--a20)" />
    <rect x="388" y="60" width="264" height="400" rx="6" fill="var(--background)" stroke="var(--accent)" stroke-width="2" />
    <rect x="712" y="84" width="264" height="352" rx="6" fill="var(--background)" stroke="var(--a20)" />
    <text x="196" y="260" text-anchor="middle" fill="var(--a55)" font-family="var(--font-sans)" font-size="22">Option A</text>
    <text x="520" y="260" text-anchor="middle" fill="var(--foreground)" font-family="var(--font-sans)" font-size="22">Recommended</text>
    <text x="844" y="260" text-anchor="middle" fill="var(--a55)" font-family="var(--font-sans)" font-size="22">Option C</text>
  </svg>
  <figcaption>The middle option preserves the required behavior with the smallest implementation surface.</figcaption>
</figure>
