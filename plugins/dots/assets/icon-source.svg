<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1254 1254" role="img" aria-label="Dots plugin icon">
  <defs>
    <linearGradient id="bg" x1="164" y1="86" x2="1090" y2="1168" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.46" stop-color="#f6efe2"/>
      <stop offset="1" stop-color="#fffaf1"/>
    </linearGradient>
    <linearGradient id="tile" x1="346" y1="318" x2="909" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d292b"/>
      <stop offset="0.56" stop-color="#17383d"/>
      <stop offset="1" stop-color="#203e43"/>
    </linearGradient>
    <radialGradient id="dot" cx="44%" cy="38%" r="70%">
      <stop offset="0" stop-color="#8ffff0"/>
      <stop offset="0.68" stop-color="#63eadb"/>
      <stop offset="1" stop-color="#34c7bd"/>
    </radialGradient>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#162529" flood-opacity="0.16"/>
    </filter>
    <filter id="dot-shadow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0c292b" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1254" height="1254" fill="#ffffff"/>
  <rect x="40" y="40" width="1174" height="1174" rx="250" fill="url(#bg)"/>

  <g filter="url(#soft-shadow)">
    <rect x="344" y="332" width="264" height="264" rx="58" fill="url(#tile)"/>
    <rect x="646" y="332" width="264" height="264" rx="58" fill="url(#tile)"/>
    <rect x="344" y="634" width="264" height="264" rx="58" fill="url(#tile)"/>
    <rect x="646" y="634" width="264" height="264" rx="58" fill="url(#tile)"/>
  </g>

  <g filter="url(#dot-shadow)">
    <circle cx="778" cy="464" r="60" fill="url(#dot)"/>
    <circle cx="476" cy="766" r="60" fill="url(#dot)"/>
  </g>
</svg>
